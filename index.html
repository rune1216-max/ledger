
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>记账本</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    background: #f5f5f7;
    font-family: system-ui, -apple-system, 'Arial Narrow', '仿宋', 'FangSong', '幼圆', 'YouYuan', sans-serif;
    color: #1c1c1e;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .app {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* 页面切换 */
  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    transition: transform 0.3s ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .page-main {
    transform: translateX(0);
    z-index: 2;
  }
  .page-summary {
    transform: translateX(100%);
    z-index: 1;
  }
  .page-ledger {
    transform: translateX(100%);
    z-index: 1;
  }
  .page-main.slide-out-left {
    transform: translateX(-100%);
  }
  .page-summary.slide-in {
    transform: translateX(0);
    z-index: 3;
  }
  .page-ledger.slide-in {
    transform: translateX(0);
    z-index: 3;
  }

  /* 顶部栏 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #efeff4;
    flex-shrink: 0;
  }
  .top-bar-left {
    display: flex;
    gap: 8px;
  }
  .date-picker {
    background: #f2f2f6;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    color: #ff9f0a;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .nav-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 6px 12px;
    color: #ff9f0a;
    font-weight: 500;
  }
  .import-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 6px 10px;
    color: #ff9f0a;
  }
  .import-file-input {
    display: none;
  }

  /* 主内容区 */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px 16px 0 16px;
  }

  /* 分类网格 */
  .section {
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .cat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f9f9fb;
    padding: 8px 0 6px;
    border-radius: 16px;
    border: 1px solid #e9e9ef;
    cursor: pointer;
    transition: all 0.1s;
  }
  .cat-item.active {
    background: #fff2e6;
    border-color: #ff9f0a;
  }
  .cat-icon { font-size: 24px; }
  .cat-name { font-size: 11px; font-weight: 500; margin-top: 4px; color: #3a3a3c; }

  /* 用途输入框 */
  .purpose-input {
    width: 100%;
    background: #f9f9fb;
    border: 1px solid #e9e9ef;
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }
  .purpose-input:focus {
    border-color: #ff9f0a;
  }

  /* 账户网格 */
  .account-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .account-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f9f9fb;
    padding: 8px 0 6px;
    border-radius: 16px;
    border: 1px solid #e9e9ef;
    cursor: pointer;
    transition: all 0.1s;
  }
  .account-item.active {
    background: #fff2e6;
    border-color: #ff9f0a;
  }
  .account-icon { font-size: 22px; }
  .account-name { font-size: 10px; font-weight: 500; margin-top: 4px; color: #3a3a3c; }

  /* 金额显示区 */
  .amount-area {
    text-align: right;
    padding: 8px 4px 12px 4px;
    border-bottom: 1px solid #efeff4;
    margin-bottom: 12px;
  }
  .amount-value {
    font-size: 48px;
    font-weight: 700;
    font-family: 'Arial Narrow', monospace;
    color: #1c1c1e;
    line-height: 1;
    letter-spacing: -1px;
  }

  /* 数字键盘 */
  .keyboard {
    background: #ffffff;
    padding: 8px 0 16px;
  }
  .key-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .key {
    flex: 1;
    background: #f2f2f6;
    border: none;
    border-radius: 50px;
    padding: 14px 0;
    font-size: 26px;
    font-weight: 500;
    font-family: monospace;
    color: #1c1c1e;
    cursor: pointer;
    text-align: center;
  }
  .key:active {
    background: #e5e5ea;
    transform: scale(0.96);
  }
  .key-zero {
    flex: 2.2;
  }
  .key-confirm {
    background: #ff9f0a;
    color: white;
    font-size: 28px;
    font-weight: 600;
  }
  .key-confirm:active {
    background: #e08e00;
  }
  .key-del {
    background: #e5e5ea;
    font-size: 22px;
  }

  /* 汇总页面样式 */
  .summary-header, .ledger-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #efeff4;
    gap: 12px;
  }
  .back-btn {
    background: #f2f2f6;
    border: none;
    border-radius: 30px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .page-title {
    font-size: 18px;
    font-weight: 600;
    flex: 1;
  }
  .filter-bar {
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    border-bottom: 1px solid #efeff4;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: #f2f2f6;
    border: none;
    border-radius: 30px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .filter-btn.active {
    background: #ff9f0a;
    color: white;
  }
  .summary-table, .ledger-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .table-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #efeff4;
  }
  .table-header {
    font-weight: 600;
    color: #8e8e93;
    font-size: 12px;
  }
  .table-name {
    font-size: 14px;
  }
  .table-amount {
    font-weight: 600;
    color: #ff3b30;
    font-family: monospace;
  }
  .empty-summary {
    text-align: center;
    color: #aeaeb2;
    padding: 40px;
  }

  /* 流水页面样式 */
  .ledger-item {
    background: #f9f9fb;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #e9e9ef;
  }
  .ledger-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .ledger-date {
    font-size: 12px;
    color: #8e8e93;
  }
  .ledger-amount {
    font-weight: 700;
    color: #ff3b30;
    font-size: 16px;
  }
  .ledger-detail {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .ledger-cat {
    background: #e9e9ef;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
  }
  .ledger-acct {
    font-size: 11px;
    color: #8e8e93;
  }
  .ledger-desc {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  .ledger-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    border-top: 1px solid #e9e9ef;
    padding-top: 10px;
    margin-top: 6px;
  }
  .edit-btn, .delete-btn {
    background: none;
    border: none;
    font-size: 14px;
    cursor: pointer;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .edit-btn {
    color: #ff9f0a;
    background: #fff2e6;
  }
  .delete-btn {
    color: #ff3b30;
    background: #ffe6e5;
  }

  /* 编辑弹窗 */
  .edit-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  .edit-card {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 28px;
    width: calc(100% - 40px);
    max-width: 400px;
  }
  .edit-card input, .edit-card select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #e9e9ef;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
  }
  .edit-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  .edit-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 14px;
  }
  .save-btn {
    background: #ff9f0a;
    color: white;
  }
  .cancel-btn {
    background: #e9e9ef;
  }

  /* 底部提示 */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(28, 28, 30, 0.9);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    opacity: 0;
    transition: all 0.15s ease;
    pointer-events: none;
    z-index: 1000;
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hidden-date-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
  }
  .install-banner {
    background: #ff9f0a;
    padding: 6px 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: white;
    display: none;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app">
  <div id="installBanner" class="install-banner">
    📱 点击浏览器菜单 → 安装应用
  </div>

  <!-- 主页面 -->
  <div id="mainPage" class="page page-main">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="nav-btn" id="openLedgerBtn">📋 流水</button>
        <button class="nav-btn" id="openSummaryBtn">📊 汇总</button>
      </div>
      <div>
        <button class="date-picker" id="dateTriggerBtn">📅 今天</button>
        <!-- 导入按钮 -->
        <button class="import-btn" id="importBtn" title="载入上次记录">📂 导入</button>
      </div>
    </div>

    <div class="main-content">
      <div class="section">
        <div class="cat-grid" id="catGrid"></div>
      </div>

      <input type="text" id="purposeInput" class="purpose-input" placeholder="用途" autocomplete="off">

      <div class="account-grid" id="accountGrid"></div>

      <div class="amount-area">
        <div class="amount-value" id="amountDisplay">0</div>
      </div>

      <div class="keyboard">
        <div class="key-row">
          <button class="key" data-num="1">1</button>
          <button class="key" data-num="2">2</button>
          <button class="key" data-num="3">3</button>
          <button class="key key-del" data-action="del">⌫</button>
        </div>
        <div class="key-row">
          <button class="key" data-num="4">4</button>
          <button class="key" data-num="5">5</button>
          <button class="key" data-num="6">6</button>
          <button class="key key-confirm" data-action="confirm">✓</button>
        </div>
        <div class="key-row">
          <button class="key" data-num="7">7</button>
          <button class="key" data-num="8">8</button>
          <button class="key" data-num="9">9</button>
          <button class="key" data-action="clear" style="background:#e5e5ea;">C</button>
        </div>
        <div class="key-row">
          <button class="key key-zero" data-num="0">0</button>
          <button class="key" data-num=".">.</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 汇总页面 -->
  <div id="summaryPage" class="page page-summary">
    <div class="summary-header">
      <button class="back-btn" id="closeSummaryBtn">← 返回</button>
      <span class="page-title">📊 汇总</span>
      <div style="width: 60px;"></div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn" data-type="day">日汇总</button>
      <button class="filter-btn active" data-type="month">月汇总</button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn" data-group="category">按分类</button>
      <button class="filter-btn active" data-group="account">按账户</button>
    </div>
    <div class="summary-table" id="summaryTable">
      <div class="empty-summary">加载中...</div>
    </div>
  </div>

  <!-- 流水页面 -->
  <div id="ledgerPage" class="page page-ledger">
    <div class="ledger-header">
      <button class="back-btn" id="closeLedgerBtn">← 返回</button>
      <span class="page-title">📋 流水账</span>
      <div style="width: 60px;"></div>
    </div>
    <div class="ledger-list" id="ledgerList">
      <div class="empty-summary">加载中...</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<input type="date" id="hiddenDatePicker" class="hidden-date-input">

<script>
// --- 全局配置 ---
  const MAX_BACKUPS = 3;
  let db;
  let records = [];
  let currentAmount = "0";
  let selectedCategory = "餐饮";
  let selectedAccount = "现金";
  // 4. 修正：默认日期直接设为今天
  let currentDate = new Date(); 

  // --- 数据库初始化 (版本升级到 2) ---
  const request = indexedDB.open("ledger_pwa", 2);
  request.onupgradeneeded = e => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("records")) {
      db.createObjectStore("records", { keyPath: "id" });
    }
    // 1. 新增备份仓库：用于存放 3 个内部副本
    if (!db.objectStoreNames.contains("backups")) {
      db.createObjectStore("backups", { keyPath: "slot" });
    }
  };
  request.onsuccess = e => {
    db = e.target.result;
    // 尝试申请持久化存储，防止 PWA 缓存被系统清理
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().then(persistent => {
        if (persistent) console.log("存储已持久化，不会被轻易清理");
      });
    }
    loadRecords();
  };

  // --- 1. 自动循环备份 (内部存储) ---
  function performAutoBackup() {
    if (!records.length) return;

    const tx = db.transaction("backups", "readwrite");
    const store = tx.objectStore("backups");

    // 获取当前的指针 (0, 1, 2 循环)
    let cursor = parseInt(localStorage.getItem('ledger_backup_slot') || "0");
    const nextSlot = (cursor + 1) % MAX_BACKUPS;

    const backupData = {
      slot: nextSlot,
      timestamp: Date.now(),
      data: JSON.parse(JSON.stringify(records)) // 深拷贝当前数据
    };

    store.put(backupData);
    localStorage.setItem('ledger_backup_slot', nextSlot);
    
    // 2. 下载信息显示 (仅 Toast 提示)
    showToast("同步成功 (内部备份已更新)");
  }

  // --- 3. 导入最后一次记录 ---
  function importBackup() {
    const tx = db.transaction("backups", "readonly");
    const req = tx.objectStore("backups").getAll();
    
    req.onsuccess = () => {
      const allBackups = req.result;
      if (!allBackups || allBackups.length === 0) {
        showToast("暂无内部备份记录");
        return;
      }

      // 找到时间戳最晚（最新）的一份
      const latest = allBackups.reduce((prev, curr) => 
        (prev.timestamp > curr.timestamp) ? prev : curr
      );

      const writeTx = db.transaction("records", "readwrite");
      const store = writeTx.objectStore("records");
      store.clear();
      latest.data.forEach(r => store.add(r));

      writeTx.oncomplete = () => {
        showToast(`已恢复至: ${new Date(latest.timestamp).toLocaleString()}`);
        refreshAll();
      };
    };
  }

  // --- 4. 修正日期选择器 (默认当天) ---
  function setupDatePicker() {
    const dateBtn = document.getElementById('dateTriggerBtn');
    const hiddenPicker = document.getElementById('hiddenDatePicker');
    
    // 强制同步 input 的初始值为今天 (YYYY-MM-DD)
    const todayStr = new Date().toISOString().split('T')[0];
    hiddenPicker.value = todayStr;

    function updateDateBtn() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      const day = currentDate.getDate();
      dateBtn.innerText = `📅 ${year}.${month}.${day}`;
    }

    dateBtn.addEventListener('click', () => {
      hiddenPicker.showPicker();
    });

    hiddenPicker.addEventListener('change', (e) => {
      const parts = e.target.value.split('-');
      // 使用本地解析避免时区偏差
      currentDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      updateDateBtn();
    });

    updateDateBtn();
  }

  // 别忘了在 saveRecord, deleteRecord, editRecord 的成功回调里调用 performAutoBackup()
</script>
</body>
</html>
