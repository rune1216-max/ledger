<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<!-- PWA 必要配置 -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<meta name="application-name" content="记账本">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22记账本%22,%22short_name%22:%22记账本%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231c1c1e%22,%22theme_color%22:%22%23ff9500%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff9500'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E💰%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff9500'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E💰%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff9500'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E💰%3C/text%3E%3C/svg%3E">
<title>记账本 | 计算器式记账</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    margin: 0;
    background: #2c2c2e;
    font-family: 'Arial Narrow', 'Arial', 'STFangsong', '仿宋', 'YouYuan', '幼圆', monospace;
    font-weight: 400;
    color: #ffffff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .app {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    height: 100%;
    background: #1c1c1e;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  
  /* 安装提示横幅（Chrome专用） */
  .install-banner {
    background: #ff9500;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    animation: slideDown 0.3s ease;
  }
  .install-banner button {
    background: white;
    border: none;
    padding: 6px 16px;
    border-radius: 20px;
    color: #ff9500;
    font-weight: bold;
    cursor: pointer;
    font-size: 12px;
  }
  @keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  
  .display-area {
    background: #0a0a0c;
    padding: 20px 24px;
    padding-top: env(safe-area-inset-top, 20px);
    border-bottom: 1px solid #3a3a3c;
  }
  
  .date-row {
    font-size: 14px;
    color: #8e8e93;
    margin-bottom: 20px;
    font-family: 'Arial Narrow', monospace;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .amount-display {
    text-align: right;
    margin-bottom: 12px;
  }
  
  .amount-label {
    font-size: 14px;
    color: #8e8e93;
  }
  
  .amount-number {
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
    word-break: break-all;
    min-height: 70px;
    font-family: 'Arial Narrow', monospace;
  }
  
  .preview-card {
    background: #2c2c2e;
    margin: 16px 20px;
    padding: 14px 18px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 15px;
  }
  .preview-label {
    color: #8e8e93;
  }
  .preview-value {
    font-weight: 600;
    font-family: 'Arial Narrow', monospace;
  }
  
  .form-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px;
    margin-bottom: 8px;
  }
  
  .input-group {
    margin-bottom: 20px;
  }
  
  .input-label {
    font-size: 12px;
    color: #8e8e93;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  
  .input-field {
    width: 100%;
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    font-family: 'Arial Narrow', 'STFangsong', '仿宋', monospace;
    color: white;
    outline: none;
  }
  
  .input-field:focus {
    border-color: #ff9500;
  }
  
  select.input-field {
    cursor: pointer;
    appearance: none;
    background: #2c2c2e url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 16px center;
  }
  
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  
  .cat-btn {
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 30px;
    padding: 12px 0;
    text-align: center;
    font-size: 15px;
    font-family: 'Arial Narrow', 'STFangsong', '仿宋', monospace;
    color: #ffffff;
    cursor: pointer;
    transition: 0.1s;
  }
  
  .cat-btn.active {
    background: #ff9500;
    border-color: #ff9500;
  }
  
  .cat-btn:active {
    transform: scale(0.96);
  }
  
  .keyboard {
    background: #1c1c1e;
    padding: 12px 16px 20px;
    padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 10px);
    border-top: 1px solid #3a3a3c;
  }
  
  .keyboard-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  
  .key {
    flex: 1;
    background: #2c2c2e;
    border: none;
    border-radius: 12px;
    padding: 16px 0;
    font-size: 28px;
    font-family: 'Arial Narrow', monospace;
    font-weight: 600;
    color: white;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 1px 0 #3a3a3c;
  }
  
  .key:active {
    background: #3a3a3c;
    transform: scale(0.96);
  }
  
  .key-zero {
    flex: 2.2;
  }
  
  .key-confirm {
    background: #ff9500;
    color: white;
    font-size: 20px;
    font-weight: 700;
  }
  
  .key-confirm:active {
    background: #e08600;
  }
  
  .key-del {
    background: #3a3a3c;
    font-size: 20px;
  }
  
  .history-section {
    max-height: 200px;
    overflow-y: auto;
    margin-top: 8px;
    border-top: 1px solid #3a3a3c;
    padding-top: 12px;
  }
  
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  
  .history-title {
    font-size: 12px;
    color: #8e8e93;
  }
  
  .history-item {
    background: #2c2c2e;
    margin-bottom: 8px;
    padding: 12px 16px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .history-desc {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  
  .history-cat {
    font-size: 11px;
    background: #3a3a3c;
    padding: 2px 8px;
    border-radius: 20px;
  }
  
  .history-meta {
    font-size: 11px;
    color: #8e8e93;
  }
  
  .history-amount {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Arial Narrow', monospace;
    color: #ff9500;
  }
  
  .empty-history {
    text-align: center;
    padding: 24px;
    color: #8e8e93;
    font-size: 13px;
  }
  
  .backup-badge {
    background: #ff9500;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
  }
  
  .toast {
    position: fixed;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 13px;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.2s;
  }
  
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #1c1c1e; }
  ::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <!-- 安装提示横幅（Chrome会显示） -->
  <div id="installBanner" class="install-banner" style="display: none;">
    <span>📱 添加到主屏幕，记账更方便</span>
    <button id="installBtn">安装</button>
  </div>
  
  <div class="display-area">
    <div class="date-row">
      <span id="current-date"></span>
      <span class="backup-badge" onclick="manualBackup()">💾 备份</span>
    </div>
    <div class="amount-display">
      <div class="amount-label">金额</div>
      <div class="amount-number" id="amount-display">0</div>
    </div>
  </div>
  
  <div class="preview-card">
    <span class="preview-label">当前记录</span>
    <span class="preview-value" id="preview-text">等待输入</span>
  </div>
  
  <div class="form-area">
    <div class="input-group">
      <div class="input-label">分类（必选）</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
    
    <div class="input-group">
      <div class="input-label">账户</div>
      <select id="account" class="input-field">
        <option value="现金">现金</option>
        <option value="信用卡">信用卡</option>
        <option value="借记卡">借记卡</option>
        <option value="微信/支付宝">微信/支付宝</option>
      </select>
    </div>
    
    <div class="input-group">
      <div class="input-label">内容（必填）</div>
      <input type="text" id="desc" class="input-field" placeholder="例：午餐 / 加油" autocomplete="off">
    </div>
    
    <div class="history-section">
      <div class="history-header">
        <span class="history-title">📋 最近支出</span>
        <span class="history-title" style="font-size:10px;" onclick="exportExcel()">📎 导出</span>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
  
  <div class="keyboard">
    <div class="keyboard-row">
      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key key-del" data-action="del">⌫</button>
    </div>
    <div class="keyboard-row">
      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key key-confirm" data-action="confirm">↵ 确认</button>
    </div>
    <div class="keyboard-row">
      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key" data-action="clear" style="background:#3a3a3c;">C</button>
    </div>
    <div class="keyboard-row">
      <button class="key key-zero" data-num="0">0</button>
      <button class="key" data-num=".">.</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const CATEGORIES = ['餐饮', '交通', '购物', '娱乐', '住房', '宝宝', '其他'];
let db;
let records = [];
let currentAmount = "0";
let selectedCat = null;
let deferredPrompt = null; // 保存安装事件

// ========== PWA 安装拦截（Chrome 添加到主屏幕） ==========
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // 显示安装横幅
  const banner = document.getElementById('installBanner');
  banner.style.display = 'flex';
  
  // 检查是否已经安装或用户选择了"不再提示"
  const installDismissed = localStorage.getItem('install_banner_dismissed');
  if(installDismissed === 'true') {
    banner.style.display = 'none';
  }
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if(outcome === 'accepted') {
    showToast('✅ 已添加到主屏幕');
    document.getElementById('installBanner').style.display = 'none';
  }
  deferredPrompt = null;
});

// 关闭横幅（可选项，但为了体验不主动关闭，让用户点安装或刷新）

// IndexedDB
const request = indexedDB.open("ledger_calc", 1);
request.onupgradeneeded = e => {
  db = e.target.result;
  if (!db.objectStoreNames.contains("records")) {
    db.createObjectStore("records", { keyPath: "id" });
  }
};
request.onsuccess = e => {
  db = e.target.result;
  loadRecords();
};
request.onerror = () => showToast("数据库错误");

function loadRecords() {
  const tx = db.transaction("records", "readonly");
  const req = tx.objectStore("records").getAll();
  req.onsuccess = () => {
    records = req.result.sort((a,b) => b.date.localeCompare(a.date));
    renderHistory();
    updateDate();
  };
}

function updateDate() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('current-date').innerHTML = `${yyyy}.${mm}.${dd} 支出`;
}

function renderCatButtons() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATEGORIES.map(cat => `<div class="cat-btn" data-cat="${cat}">${cat}</div>`).join('');
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCat = btn.getAttribute('data-cat');
      updatePreview();
    });
  });
}

function updatePreview() {
  const desc = document.getElementById('desc').value.trim();
  const amountNum = parseFloat(currentAmount);
  const account = document.getElementById('account').value;
  const catName = selectedCat || '未选';
  const amountShow = isNaN(amountNum) ? '0' : amountNum.toFixed(2);
  document.getElementById('preview-text').innerHTML = `${catName} · ${desc || '无内容'} · ${account} · ¥${amountShow}`;
}

function setupKeyboard() {
  const amountDisplay = document.getElementById('amount-display');
  function updateDisplay() {
    let num = parseFloat(currentAmount);
    if(isNaN(num)) num = 0;
    if(currentAmount === "") currentAmount = "0";
    amountDisplay.innerText = parseFloat(currentAmount).toFixed(2);
    updatePreview();
  }
  document.querySelectorAll('[data-num]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.getAttribute('data-num');
      if(val === '.' && currentAmount.includes('.')) return;
      if(currentAmount === "0" && val !== '.') currentAmount = val;
      else currentAmount += val;
      updateDisplay();
    });
  });
  document.querySelector('[data-action="del"]').addEventListener('click', () => {
    if(currentAmount.length > 1) currentAmount = currentAmount.slice(0, -1);
    else currentAmount = "0";
    updateDisplay();
  });
  document.querySelector('[data-action="clear"]').addEventListener('click', () => {
    currentAmount = "0";
    updateDisplay();
  });
  document.querySelector('[data-action="confirm"]').addEventListener('click', () => saveRecord());
}

async function saveRecord() {
  const amount = parseFloat(currentAmount);
  const desc = document.getElementById('desc').value.trim();
  const account = document.getElementById('account').value;
  if(isNaN(amount) || amount <= 0) { showToast("❌ 请输入金额"); return; }
  if(!selectedCat) { showToast("❌ 请选择分类"); return; }
  if(!desc) { showToast("❌ 请填写内容"); return; }
  
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const record = { id: Date.now(), date: dateStr, amount, desc, cat: selectedCat, acct: account, type: 'out' };
  
  const tx = db.transaction("records", "readwrite");
  tx.objectStore("records").add(record);
  tx.oncomplete = () => {
    records.unshift(record);
    renderHistory();
    document.getElementById('desc').value = '';
    currentAmount = "0";
    document.getElementById('amount-display').innerText = "0.00";
    updatePreview();
    showToast(`✅ 支出 ${amount.toFixed(2)}`);
    performAutoBackup();
  };
  tx.onerror = () => showToast("保存失败");
}

function performAutoBackup() {
  if(!records.length) return;
  try {
    const backupData = { version: "calc", time: new Date().toISOString(), totalRecords: records.length, records };
    const jsonStr = JSON.stringify(backupData, null, 2);
    const blob = new Blob([jsonStr], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = `ledger_${timestamp}.json`;
    a.href = url;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    let backups = JSON.parse(localStorage.getItem('ledger_backup_list') || '[]');
    backups.push({ time: timestamp, date: new Date().toISOString(), count: records.length });
    while(backups.length > 3) backups.shift();
    localStorage.setItem('ledger_backup_list', JSON.stringify(backups));
  } catch(e) { console.warn(e); }
}

function manualBackup() { performAutoBackup(); showToast("✅ 备份完成"); }

function renderHistory() {
  const container = document.getElementById('history-list');
  if(!records.length) { container.innerHTML = '<div class="empty-history">暂无支出记录</div>'; return; }
  container.innerHTML = records.slice(0, 30).map(r => `
    <div class="history-item">
      <div><div class="history-desc">${escapeHtml(r.desc)}<span class="history-cat">${r.cat}</span></div>
      <div class="history-meta">${r.date} · ${r.acct}</div></div>
      <div class="history-amount">-${r.amount.toFixed(2)}</div>
    </div>
  `).join('');
}

function exportExcel() {
  if(!records.length) { showToast("暂无数据"); return; }
  const script = document.createElement('script');
  script.src = "https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js";
  script.onload = () => {
    const ws = XLSX.utils.json_to_sheet(records.map(r => ({ '日期': r.date, '金额': r.amount, '内容': r.desc, '分类': r.cat, '账户': r.acct })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "支出记录");
    XLSX.writeFile(wb, `支出记录_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast("导出成功");
  };
  script.onerror = () => showToast("导出失败");
  document.head.appendChild(script);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 2000);
}

function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

document.getElementById('desc').addEventListener('input', () => updatePreview());
document.getElementById('account').addEventListener('change', () => updatePreview());

renderCatButtons();
setupKeyboard();
updateDate();
updatePreview();
</script>
</body>
</html>
