<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="记账本">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="./manifest.json">
<title>记账本</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --ink: #1a1a1a; --paper: #f5f0e8; --cream: #ede8da;
    --accent: #c0392b; --accent2: #2980b9; --green: #27ae60;
    --muted: #8a8070; --border: #c8bfaa; --shadow: rgba(0,0,0,0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    display: flex; flex-direction: column;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,170,150,0.15) 27px, rgba(180,170,150,0.15) 28px);
  }
  header {
    background: var(--ink); color: var(--paper);
    padding: calc(16px + var(--safe-top)) 24px 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3); flex-shrink: 0;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.1em; }
  header p { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono',monospace; margin-top: 2px; }
  .tabs { display: flex; background: var(--cream); border-bottom: 2px solid var(--border); flex-shrink: 0; }
  .tab {
    flex: 1; padding: 11px 8px; text-align: center; cursor: pointer;
    font-size: 0.85rem; color: var(--muted); border-bottom: 3px solid transparent;
    transition: all 0.2s; font-weight: 600; -webkit-tap-highlight-color: transparent;
  }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); background: var(--paper); }
  .pages { flex: 1; overflow: hidden; position: relative; }
  .page {
    display: none; padding: 18px 16px calc(18px + var(--safe-bottom));
    height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .page.active { display: block; }
  .form-card {
    background: white; border-radius: 8px; padding: 18px;
    box-shadow: 0 2px 16px var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
  }
  .form-row { display: flex; gap: 10px; margin-bottom: 11px; align-items: center; }
  label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; width: 36px; flex-shrink: 0; }
  input, select {
    flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.9rem; font-family: 'Noto Serif SC',serif;
    background: var(--paper); color: var(--ink); outline: none;
    transition: border-color 0.2s; -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent2); background: white; }
  .type-toggle { display: flex; gap: 8px; flex: 1; }
  .type-btn {
    flex: 1; padding: 9px; border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--paper); cursor: pointer; font-size: 0.9rem;
    font-family: 'Noto Serif SC',serif; font-weight: 600; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .type-btn.out.active { background: #fdecea; border-color: var(--accent); color: var(--accent); }
  .type-btn.in.active { background: #eafaf1; border-color: var(--green); color: var(--green); }
  .submit-btn {
    width: 100%; padding: 13px; background: var(--ink); color: var(--paper);
    border: none; border-radius: 6px; font-size: 1rem;
    font-family: 'Noto Serif SC',serif; font-weight: 700; cursor: pointer;
    letter-spacing: 0.1em; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .submit-btn:active { transform: scale(0.98); }
  .cat-badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 0.72rem; font-weight: 700; color: white;
  }
  .cat-工资 { background: #0a1a44; } .cat-房租 { background: #20c997; }
  .cat-交通 { background: #e67e22; } .cat-住房 { background: #8e44ad; }
  .cat-日用 { background: #27ae60; } .cat-娱乐 { background: #2980b9; }
  .cat-饮食 { background: #c0392b; } .cat-其他 { background: #7f8c8d; }
  .cat-税费 { background: #6c3483; } .cat-宝贝 { background: #e91e8c; }
  .acct-badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 0.72rem; font-weight: 700; color: white; margin-left: 4px;
  }
  .acct-现金 { background: #27ae60; }
  .acct-信用卡 { background: #c0392b; }
  .acct-借记卡 { background: #2980b9; }
  .acct-微信支付宝 { background: #1aad19; }
  .field-error { border-color: var(--accent) !important; background: #fff5f5 !important; }
  .error-msg { color: var(--accent); font-size: 0.78rem; margin-top: -7px; margin-bottom: 8px; padding-left: 46px; display: none; }
  .error-msg.show { display: block; }
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 14px;
    overflow-x: auto; padding-bottom: 4px; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    background: white; font-size: 0.78rem; cursor: pointer; white-space: nowrap;
    font-family: 'Noto Serif SC',serif; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .record-item {
    background: white; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 1px 6px var(--shadow); border: 1px solid var(--border);
  }
  .record-left { flex: 1; min-width: 0; }
  .record-desc { font-size: 0.92rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .record-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; font-family: 'Space Mono',monospace; }
  .record-amount { font-family: 'Space Mono',monospace; font-size: 1rem; font-weight: 700; white-space: nowrap; }
  .record-amount.out { color: var(--accent); } .record-amount.in { color: var(--green); }
  .del-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    padding: 4px 6px; font-size: 1rem; opacity: 0.5; -webkit-tap-highlight-color: transparent;
  }
  .empty-msg { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
  .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .sum-card {
    background: white; border-radius: 8px; padding: 14px; text-align: center;
    box-shadow: 0 2px 10px var(--shadow); border: 1px solid var(--border);
  }
  .sum-card.full { grid-column: 1 / -1; }
  .sum-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .sum-value { font-family: 'Space Mono',monospace; font-size: 1.3rem; font-weight: 700; }
  .sum-value.out { color: var(--accent); } .sum-value.in { color: var(--green); }
  .sum-value.net.pos { color: var(--green); } .sum-value.net.neg { color: var(--accent); }
  .cat-summary {
    background: white; border-radius: 8px; padding: 16px;
    box-shadow: 0 2px 10px var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
  }
  .cat-summary h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cat-row-name { width: 48px; font-size: 0.82rem; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; background: var(--cream); border-radius: 4px; height: 8px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .cat-row-val { width: 70px; text-align: right; font-size: 0.8rem; font-family: 'Space Mono',monospace; }
  .export-btn {
    width: 100%; padding: 13px; background: var(--accent2); color: white;
    border: none; border-radius: 6px; font-size: 0.95rem;
    font-family: 'Noto Serif SC',serif; font-weight: 700; cursor: pointer;
    letter-spacing: 0.08em; -webkit-tap-highlight-color: transparent;
  }
  .month-select-wrap { margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .month-select-wrap select { max-width: 160px; }
  .month-select-wrap label { width: auto; }
  #install-banner {
    display: none; background: #1a1a1a; color: #f5f0e8;
    padding: 10px 16px; font-size: 0.82rem;
    align-items: center; gap: 10px; flex-shrink: 0;
  }
  #install-banner span { flex: 1; }
  #install-btn {
    background: var(--accent2); color: white; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 0.82rem; font-family: 'Noto Serif SC',serif; font-weight: 700; cursor: pointer;
  }
  #install-dismiss { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; }
  .toast {
    position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--paper); padding: 10px 22px;
    border-radius: 20px; font-size: 0.85rem; font-weight: 600;
    transition: transform 0.3s ease; z-index: 999; pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <h1>👛 记账本</h1>
  <p id="header-date"></p>
</header>
<div id="install-banner">
  <span>📲 添加到主屏幕，像 App 一样使用</span>
  <button id="install-btn" onclick="installPWA()">安装</button>
  <button id="install-dismiss" onclick="dismissInstall()">✕</button>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('add')">＋ 记账</div>
  <div class="tab" onclick="switchTab('list')">📋 明细</div>
  <div class="tab" onclick="switchTab('summary')">📊 汇总</div>
</div>
<div class="pages">
  <div class="page active" id="page-add">
    <div class="form-card">
      <div class="form-row"><label>日期</label><input type="date" id="f-date"></div>
      <div class="form-row">
        <label>账户</label>
        <select id="f-acct">
          <option value="现金">💵 现金</option>
          <option value="借记卡">💳 借记卡</option>
          <option value="信用卡">💳 信用卡</option>
          <option value="微信支付宝">📱 微信/支付宝</option>
        </select>
      </div>
      <div class="form-row">
        <label>类型</label>
        <div class="type-toggle">
          <button class="type-btn out active" id="btn-out" onclick="setType('out')">支出 −</button>
          <button class="type-btn in" id="btn-in" onclick="setType('in')">收入 ＋</button>
        </div>
      </div>
      <div class="form-row">
        <label>分类</label>
        <select id="f-cat" onchange="clearError('cat')">
          <option value="">— 请选择分类 —</option>
        </select>
      </div>
      <div class="error-msg" id="err-cat">⚠ 请选择一个分类</div>
      <div class="form-row"><label>内容</label><input type="text" id="f-desc" placeholder="描述这笔账…" maxlength="40" oninput="clearError('desc')"></div>
      <div class="error-msg" id="err-desc">⚠ 请填写描述内容</div>
      <div class="form-row"><label>金额</label><input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal"></div>
      <button class="submit-btn" onclick="addRecord()">记 入</button>
    </div>
  </div>
  <div class="page" id="page-list">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('饮食',this)">🍜 饮食</button>
      <button class="filter-btn" onclick="setFilter('日用',this)">🛒 日用</button>
      <button class="filter-btn" onclick="setFilter('交通',this)">🚌 交通</button>
      <button class="filter-btn" onclick="setFilter('娱乐',this)">🎮 娱乐</button>
      <button class="filter-btn" onclick="setFilter('住房',this)">🏠 住房</button>
      <button class="filter-btn" onclick="setFilter('税费',this)">🧾 税费</button>
      <button class="filter-btn" onclick="setFilter('宝贝',this)">🍼 宝贝</button>
      <button class="filter-btn" onclick="setFilter('其他',this)">📦 其他</button>
      <button class="filter-btn" onclick="setFilter('工资',this)">💴 工资</button>
      <button class="filter-btn" onclick="setFilter('房租',this)">🏘 房租</button>
    </div>
    <div id="record-list"></div>
  </div>
  <div class="page" id="page-summary">
    <div class="month-select-wrap">
      <label>月份</label>
      <select id="month-select" onchange="renderSummary()"></select>
    </div>
    <div class="summary-cards">
      <div class="sum-card"><div class="sum-label">总支出</div><div class="sum-value out" id="s-out">$0.00</div></div>
      <div class="sum-card"><div class="sum-label">总收入</div><div class="sum-value in" id="s-in">$0.00</div></div>
      <div class="sum-card full"><div class="sum-label">净余额</div><div class="sum-value net" id="s-net">$0.00</div></div>
    </div>
    <div class="cat-summary"><h3>支出分类分布</h3><div id="cat-chart"></div></div>
    <button class="export-btn" onclick="exportExcel()">⬇ 导出为 Excel</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const CATS_OUT=['饮食','日用','交通','娱乐','住房','税费','宝贝','其他'];
const CATS_IN=['工资','房租','其他'];
const CATS=[...new Set([...CATS_OUT,...CATS_IN])];
const CAT_COLORS={'交通':'#e67e22','住房':'#8e44ad','日用':'#27ae60','娱乐':'#2980b9','饮食':'#c0392b','其他':'#7f8c8d','工资':'#0a1a44','房租':'#20c997','税费':'#6c3483','宝贝':'#e91e8c'};
let currentType='out', currentFilter='all', deferredPrompt=null;
let records=JSON.parse(localStorage.getItem('ledger_records')||'[]');

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  if(!localStorage.getItem('install_dismissed'))
    document.getElementById('install-banner').style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').style.display='none';
  showToast('已添加到主屏幕 ✓');
});
function installPWA(){
  if(deferredPrompt){ deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{ deferredPrompt=null;
      document.getElementById('install-banner').style.display='none'; }); }
}
function dismissInstall(){
  document.getElementById('install-banner').style.display='none';
  localStorage.setItem('install_dismissed','1');
}
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

function save(){ localStorage.setItem('ledger_records',JSON.stringify(records)); }

document.addEventListener('DOMContentLoaded',()=>{
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-date').value=today;
  document.getElementById('header-date').textContent=formatDateDisplay(today);
  populateMonthSelect(); renderList(); renderSummary(); updateCats('out');
});

function formatDateDisplay(d){
  return new Date(d+'T00:00:00').toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['add','list','summary'][i]===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='list') renderList();
  if(tab==='summary'){ populateMonthSelect(); renderSummary(); }
}
function updateCats(t){
  const sel=document.getElementById('f-cat');
  const cats=t==='out'?CATS_OUT:CATS_IN;
  const emojis={'饮食':'🍜','日用':'🛒','交通':'🚌','娱乐':'🎮','住房':'🏠','税费':'🧾','宝贝':'🍼','其他':'📦','工资':'💴','房租':'🏘'};
  sel.innerHTML='<option value="">— 请选择分类 —</option>'+cats.map(c=>`<option value="${c}">${emojis[c]||''} ${c}</option>`).join('');
}
function setType(t){
  currentType=t;
  document.getElementById('btn-out').classList.toggle('active',t==='out');
  document.getElementById('btn-in').classList.toggle('active',t==='in');
  updateCats(t);
  clearError('cat');
}
function clearError(field){
  if(field==='desc'){
    document.getElementById('err-desc').classList.remove('show');
    document.getElementById('f-desc').classList.remove('field-error');
  } else if(field==='cat'){
    document.getElementById('err-cat').classList.remove('show');
    document.getElementById('f-cat').classList.remove('field-error');
  }
}
function addRecord(){
  const date=document.getElementById('f-date').value;
  const acct=document.getElementById('f-acct').value;
  const desc=document.getElementById('f-desc').value.trim();
  const cat=document.getElementById('f-cat').value;
  const amount=parseFloat(document.getElementById('f-amount').value);
  let hasError=false;
  if(!date){showToast('请选择日期');return;}
  if(!desc){
    document.getElementById('err-desc').classList.add('show');
    document.getElementById('f-desc').classList.add('field-error');
    hasError=true;
  }
  if(!cat){
    document.getElementById('err-cat').classList.add('show');
    document.getElementById('f-cat').classList.add('field-error');
    hasError=true;
  }
  if(hasError)return;
  if(!amount||amount<=0){showToast('请输入有效金额');return;}
  records.push({id:Date.now(),date,acct,desc,cat,type:currentType,amount:Math.round(amount*100)/100});
  records.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  save();
  document.getElementById('f-desc').value='';
  document.getElementById('f-amount').value='';
  document.getElementById('f-cat').value='';
  showToast('已记入 ✓');
}
function setFilter(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderList();
}
function renderList(){
  const filtered=currentFilter==='all'?records:records.filter(r=>r.cat===currentFilter);
  const el=document.getElementById('record-list');
  if(!filtered.length){el.innerHTML='<div class="empty-msg">暂无记录</div>';return;}
  const groups={};
  filtered.forEach(r=>{if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r);});
  let html='';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    html+=`<div style="font-size:0.75rem;color:var(--muted);margin:12px 2px 6px;font-family:'Space Mono',monospace;">${date}</div>`;
    groups[date].forEach(r=>{
      const sign=r.type==='out'?'−':'+';
      html+=`<div class="record-item">
        <div class="record-left">
          <div class="record-desc">${r.desc}</div>
          <div class="record-meta"><span class="cat-badge cat-${r.cat}">${r.cat}</span><span class="acct-badge acct-${(r.acct||'现金').replace('/','').replace('微信支付宝','微信支付宝')}">${r.acct||'现金'}</span></div>
        </div>
        <div class="record-amount ${r.type}">${sign}$${r.amount.toFixed(2)}</div>
        <button class="del-btn" onclick="deleteRecord(${r.id})">✕</button>
      </div>`;
    });
  });
  el.innerHTML=html;
}
function deleteRecord(id){
  if(!confirm('确认删除这条记录？'))return;
  records=records.filter(r=>r.id!==id); save(); renderList(); showToast('已删除');
}
function populateMonthSelect(){
  const sel=document.getElementById('month-select');
  const months=new Set();
  records.forEach(r=>months.add(r.date.slice(0,7)));
  const today=new Date().toISOString().slice(0,7);
  months.add(today);
  const sorted=[...months].sort((a,b)=>b.localeCompare(a));
  const current=sel.value||today;
  sel.innerHTML=sorted.map(m=>`<option value="${m}" ${m===current?'selected':''}>${m.replace('-','年')}月</option>`).join('');
}
function renderSummary(){
  const month=document.getElementById('month-select').value;
  const mR=records.filter(r=>r.date.startsWith(month));
  const totalOut=mR.filter(r=>r.type==='out').reduce((s,r)=>s+r.amount,0);
  const totalIn=mR.filter(r=>r.type==='in').reduce((s,r)=>s+r.amount,0);
  const net=totalIn-totalOut;
  document.getElementById('s-out').textContent='$'+totalOut.toFixed(2);
  document.getElementById('s-in').textContent='$'+totalIn.toFixed(2);
  const netEl=document.getElementById('s-net');
  netEl.textContent=(net>=0?'+':'')+'$'+net.toFixed(2);
  netEl.className='sum-value net '+(net>=0?'pos':'neg');
  const catTotals={};
  CATS_OUT.forEach(c=>catTotals[c]=0);
  mR.filter(r=>r.type==='out').forEach(r=>catTotals[r.cat]=(catTotals[r.cat]||0)+r.amount);
  const maxVal=Math.max(...Object.values(catTotals),1);
  document.getElementById('cat-chart').innerHTML=CATS_OUT.map(cat=>{
    const val=catTotals[cat]||0;
    const pct=(val/maxVal*100).toFixed(1);
    return `<div class="cat-row">
      <div class="cat-row-name"><span class="cat-badge cat-${cat}">${cat}</span></div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${CAT_COLORS[cat]}"></div></div>
      <div class="cat-row-val">$${val.toFixed(2)}</div>
    </div>`;
  }).join('');
}
function exportExcel(){
  const month=document.getElementById('month-select').value;
  const mR=records.filter(r=>r.date.startsWith(month));
  if(!mR.length){showToast('该月暂无数据');return;}
  const wb=XLSX.utils.book_new();
  const detail=[['日期','账户','内容','分类','类型','金额']];
  mR.forEach(r=>detail.push([r.date,r.acct||'现金',r.desc,r.cat,r.type==='out'?'支出':'收入',r.type==='out'?-r.amount:r.amount]));
  const ws1=XLSX.utils.aoa_to_sheet(detail);
  ws1['!cols']=[{wch:12},{wch:10},{wch:24},{wch:8},{wch:6},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws1,'明细');
  const totalOut=mR.filter(r=>r.type==='out').reduce((s,r)=>s+r.amount,0);
  const totalIn=mR.filter(r=>r.type==='in').reduce((s,r)=>s+r.amount,0);
  const catTotals={};CATS_OUT.forEach(c=>catTotals[c]=0);
  mR.filter(r=>r.type==='out').forEach(r=>catTotals[r.cat]=(catTotals[r.cat]||0)+r.amount);
  const summary=[[`${month.replace('-','年')}月 账目汇总`],[],
    ['总支出',totalOut],['总收入',totalIn],['净余额',totalIn-totalOut],[],
    ['支出分类','金额'],...CATS_OUT.map(c=>[c,catTotals[c]])];
  const ws2=XLSX.utils.aoa_to_sheet(summary);
  ws2['!cols']=[{wch:16},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'汇总');
  XLSX.writeFile(wb,`记账本_${month}.xlsx`);
  showToast('Excel 已导出 ✓');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
