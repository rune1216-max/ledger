<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>记账本 v2.3</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #f5f5f7; font-family: system-ui, -apple-system, sans-serif; color: #1c1c1e; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .app { max-width: 500px; margin: 0 auto; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  /* 页面切换逻辑 */
  .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; transition: transform 0.3s ease; display: flex; flex-direction: column; z-index: 1; visibility: hidden; }
  .active-page { transform: translateX(0); visibility: visible; z-index: 5; }
  .page-main { visibility: visible; z-index: 2; }
  .page-out { transform: translateX(-100%); }
  .page-in { transform: translateX(0); visibility: visible; z-index: 10; }

  /* 顶部导航 */
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid #efeff4; flex-shrink: 0; }
  .nav-btn { background: none; border: none; font-size: 15px; color: #ff9f0a; font-weight: 600; cursor: pointer; padding: 5px; }
  .date-display { background: #f2f2f6; padding: 5px 12px; border-radius: 20px; font-size: 13px; color: #ff9f0a; border: none; font-weight: 500; }

  /* 主内容滚动区 */
  .main-scroll { flex: 1; overflow-y: auto; padding: 10px 16px 0; display: flex; flex-direction: column; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
  .item { display: flex; flex-direction: column; align-items: center; background: #f9f9fb; padding: 8px 0; border-radius: 14px; border: 1px solid #e9e9ef; }
  .item.active { background: #fff2e6; border-color: #ff9f0a; }
  .icon { font-size: 22px; } .name { font-size: 11px; margin-top: 2px; }

  .input-box { width: 100%; background: #f9f9fb; border: 1px solid #e9e9ef; border-radius: 12px; padding: 10px 14px; font-size: 14px; outline: none; margin-bottom: 10px; }
  
  /* 金额显示：彻底压缩下间距 */
  .amount-area { text-align: right; padding: 0 4px 5px; border-bottom: 2px solid #ff9f0a; margin-bottom: 2px; }
  .amount-txt { font-size: 42px; font-weight: 700; font-family: 'Arial Narrow', monospace; line-height: 1; }

  /* 键盘区域：紧贴金额栏 */
  .keyboard-wrap { background: #ffffff; padding: 5px 16px 5px; flex-shrink: 0; }
  .key-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .key { flex: 1; background: #f2f2f6; border: none; border-radius: 12px; padding: 14px 0; font-size: 22px; font-weight: 600; font-family: monospace; }
  .key-orange { background: #ff9f0a; color: white; }

  /* 版本号：位于最底部中心 */
  .v-tag { text-align: center; font-size: 10px; color: #c7c7cc; padding-bottom: 8px; font-family: monospace; }

  /* 其他页面样式 */
  .list-box { flex: 1; overflow-y: auto; padding: 16px; }
  .card { background: #f9f9fb; border-radius: 14px; padding: 12px; margin-bottom: 10px; border: 1px solid #e9e9ef; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 6px 15px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.2s; z-index: 1000; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <div id="pMain" class="page active-page">
    <div class="top-bar">
      <div>
        <button class="nav-btn" onclick="goPage('pLedger')">📋 流水</button>
        <button class="nav-btn" onclick="goPage('pSum')">📊 汇总</button>
      </div>
      <div>
        <button class="date-display" id="dateBtn" onclick="openPicker()">📅 加载中...</button>
        <button class="nav-btn" onclick="importData()">📂 导入</button>
      </div>
    </div>

    <div class="main-scroll">
      <div id="catG" class="grid"></div>
      <input type="text" id="descI" class="input-box" placeholder="用途说明..." autocomplete="off">
      <div id="accG" class="grid"></div>
      <div class="amount-area"><span class="amount-txt" id="amtD">0.00</span></div>
    </div>

    <div class="keyboard-wrap">
      <div class="key-row">
        <button class="key" onclick="k('1')">1</button><button class="key" onclick="k('2')">2</button><button class="key" onclick="k('3')">3</button><button class="key" style="background:#e5e5ea" onclick="k('d')">⌫</button>
      </div>
      <div class="key-row">
        <button class="key" onclick="k('4')">4</button><button class="key" onclick="k('5')">5</button><button class="key" onclick="k('6')">6</button><button class="key key-orange" onclick="doSave()">✓</button>
      </div>
      <div class="key-row">
        <button class="key" onclick="k('7')">7</button><button class="key" onclick="k('8')">8</button><button class="key" onclick="k('9')">9</button><button class="key" style="background:#e5e5ea" onclick="k('c')">C</button>
      </div>
      <div class="key-row">
        <button class="key" style="flex:2.2" onclick="k('0')">0</button><button class="key" onclick="k('.')">.</button>
      </div>
    </div>
    <div class="v-tag">v2.3</div>
  </div>

  <div id="pLedger" class="page">
    <div class="top-bar"><button class="nav-btn" onclick="backMain()">← 返回</button><b>账目明细</b><div style="width:40px"></div></div>
    <div id="ledgerList" class="list-box"></div>
  </div>

  <div id="pSum" class="page">
    <div class="top-bar"><button class="nav-btn" onclick="backMain()">← 返回</button><b>数据汇总</b><div style="width:40px"></div></div>
    <div id="sumList" class="list-box"></div>
  </div>

  <input type="date" id="dateInput" style="display:none">
  <div id="tst" class="toast"></div>
</div>

<script>
  const CATS = ["餐饮","交通","购物","娱乐","住房","宝宝","日用","其他"];
  const ICONS = ["🍜","🚗","🛒","🎬","🏠","👶","🧴","📦"];
  const ACCS = ["现金","信用卡","借记卡","微信"];
  const AICONS = ["💵","💳","🏦","💬"];

  // 1. 日期初始化锁定：强制获取当前设备时间
  function getToday() {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  }

  let db, records = [], curAmt = "0", curCat = "餐饮", curAcc = "现金", curDate = getToday();

  // 数据库
  const req = indexedDB.open("ledger_v23", 1);
  req.onupgradeneeded = e => { e.target.result.createObjectStore("records", {keyPath:"id"}); };
  req.onsuccess = e => { db = e.target.result; load(); };

  function load() {
    db.transaction("records").objectStore("records").getAll().onsuccess = e => {
      records = e.target.result.sort((a,b) => b.id - a.id);
      render();
    };
  }

  function render() {
    document.getElementById('amtD').innerText = parseFloat(curAmt).toFixed(2);
    document.getElementById('dateBtn').innerText = "📅 " + curDate;
    
    document.getElementById('catG').innerHTML = CATS.map((n,i)=>`
      <div class="item ${curCat==n?'active':''}" onclick="curCat='${n}';render()">
        <span class="icon">${ICONS[i]}</span><span class="name">${n}</span>
      </div>`).join('');
    
    document.getElementById('accG').innerHTML = ACCS.map((n,i)=>`
      <div class="item ${curAcc==n?'active':''}" onclick="curAcc='${n}';render()">
        <span class="icon">${AICONS[i]}</span><span class="name">${n}</span>
      </div>`).join('');
  }

  function k(v) {
    if(v==='c') curAmt="0";
    else if(v==='d') curAmt = curAmt.length>1 ? curAmt.slice(0,-1) : "0";
    else if(v==='.') { if(!curAmt.includes('.')) curAmt += '.'; }
    else curAmt = curAmt==="0" ? v : curAmt + v;
    render();
  }

  function doSave() {
    const a = parseFloat(curAmt);
    if(a<=0) return msg("请输入金额");
    const r = { id:Date.now(), amt:a, cat:curCat, acc:curAcc, desc:document.getElementById('descI').value||"无备注", date:curDate };
    const tx = db.transaction("records","readwrite");
    tx.objectStore("records").add(r);
    tx.oncomplete = () => {
      records.unshift(r); curAmt="0"; document.getElementById('descI').value="";
      render(); msg("已记账 ¥"+a.toFixed(2));
      localStorage.setItem('ledger_bk', JSON.stringify(records));
    };
  }

  // 页面导航
  function goPage(id) {
    if(id==='pLedger') renderLedger();
    if(id==='pSum') renderSum();
    document.getElementById(id).classList.add('page-in');
  }
  function backMain() { document.querySelectorAll('.page').forEach(p=>p.classList.remove('page-in')); }

  function renderLedger() {
    document.getElementById('ledgerList').innerHTML = records.map(r=>`
      <div class="card">
        <div style="font-size:11px;color:#8e8e93">${r.date}</div>
        <div style="display:flex;justify-content:space-between;margin:4px 0">
          <b>${r.cat} <small>(${r.acc})</small></b>
          <b style="color:#ff3b30">-¥${r.amt.toFixed(2)}</b>
        </div>
        <div style="font-size:13px">${r.desc}</div>
      </div>`).join('') || "暂无数据";
  }

  function renderSum() {
    const m = {};
    records.forEach(r => { m[r.cat] = (m[r.cat]||0) + r.amt; });
    document.getElementById('sumList').innerHTML = Object.keys(m).map(k=>`
      <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee">
        <span>${k}</span><b>¥${m[k].toFixed(2)}</b>
      </div>`).join('') || "暂无数据";
  }

  function importData() {
    const b = localStorage.getItem('ledger_bk');
    if(!b) return msg("未找到备份");
    const data = JSON.parse(b);
    const tx = db.transaction("records","readwrite");
    const s = tx.objectStore("records");
    s.clear();
    data.forEach(r => s.add(r));
    tx.oncomplete = () => location.reload();
  }

  function msg(s) {
    const t = document.getElementById('tst');
    t.innerText = s; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1500);
  }

  const dI = document.getElementById('dateInput');
  function openPicker() { dI.showPicker(); }
  dI.onchange = e => { if(e.target.value) { curDate = e.target.value; render(); } };
  dI.value = curDate;

  render();
</script>
</body>
</html>
