<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>记账本</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    background: #f5f5f7;
    font-family: system-ui, -apple-system, 'Arial Narrow', '仿宋', 'FangSong', '幼圆', 'YouYuan', sans-serif;
    color: #1c1c1e;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .app {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 顶部栏 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #efeff4;
    flex-shrink: 0;
  }
  .date-picker {
    background: #f2f2f6;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    color: #ff9f0a;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .backup-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 6px 10px;
  }

  /* 主内容区 - 固定高度不滚动 */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px 16px 0 16px;
  }

  /* 分类网格 */
  .section {
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .cat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f9f9fb;
    padding: 8px 0 6px;
    border-radius: 16px;
    border: 1px solid #e9e9ef;
    cursor: pointer;
    transition: all 0.1s;
  }
  .cat-item.active {
    background: #fff2e6;
    border-color: #ff9f0a;
  }
  .cat-icon { font-size: 24px; }
  .cat-name { font-size: 11px; font-weight: 500; margin-top: 4px; color: #3a3a3c; }

  /* 用途输入框 */
  .purpose-input {
    width: 100%;
    background: #f9f9fb;
    border: 1px solid #e9e9ef;
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }
  .purpose-input:focus {
    border-color: #ff9f0a;
  }

  /* 账户网格 - 4列 */
  .account-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .account-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f9f9fb;
    padding: 8px 0 6px;
    border-radius: 16px;
    border: 1px solid #e9e9ef;
    cursor: pointer;
    transition: all 0.1s;
  }
  .account-item.active {
    background: #fff2e6;
    border-color: #ff9f0a;
  }
  .account-icon { font-size: 22px; }
  .account-name { font-size: 10px; font-weight: 500; margin-top: 4px; color: #3a3a3c; }

  /* 金额显示区 - 右对齐 */
  .amount-area {
    text-align: right;
    padding: 8px 4px 12px 4px;
    border-bottom: 1px solid #efeff4;
    margin-bottom: 12px;
  }
  .amount-value {
    font-size: 48px;
    font-weight: 700;
    font-family: 'Arial Narrow', monospace;
    color: #1c1c1e;
    line-height: 1;
    letter-spacing: -1px;
  }

  /* 数字键盘 */
  .keyboard {
    background: #ffffff;
    padding: 8px 0 16px;
  }
  .key-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .key {
    flex: 1;
    background: #f2f2f6;
    border: none;
    border-radius: 50px;
    padding: 14px 0;
    font-size: 26px;
    font-weight: 500;
    font-family: monospace;
    color: #1c1c1e;
    cursor: pointer;
    text-align: center;
  }
  .key:active {
    background: #e5e5ea;
    transform: scale(0.96);
  }
  .key-zero {
    flex: 2.2;
  }
  .key-confirm {
    background: #ff9f0a;
    color: white;
    font-size: 28px;
    font-weight: 600;
  }
  .key-confirm:active {
    background: #e08e00;
  }
  .key-del {
    background: #e5e5ea;
    font-size: 22px;
  }

  /* 历史记录 - 紧凑 */
  .history-section {
    flex-shrink: 0;
    background: #ffffff;
    border-top: 1px solid #efeff4;
    padding: 10px 0 8px;
    max-height: 135px;
    overflow-y: auto;
  }
  .history-header {
    font-size: 11px;
    font-weight: 600;
    color: #8e8e93;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #efeff4;
    font-size: 13px;
  }
  .history-detail {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .history-cat {
    font-size: 10px;
    background: #f2f2f6;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .history-meta {
    font-size: 10px;
    color: #8e8e93;
  }
  .history-amount {
    font-weight: 700;
    color: #ff3b30;
    font-family: monospace;
    font-size: 14px;
  }
  .empty-history {
    text-align: center;
    color: #aeaeb2;
    padding: 16px;
    font-size: 12px;
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c1e;
    color: white;
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .hidden-date-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
  }
  .install-banner {
    background: #ff9f0a;
    padding: 6px 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: white;
    display: none;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app">
  <div id="installBanner" class="install-banner">
    📱 点击浏览器菜单 → 安装应用
  </div>
  
  <div class="top-bar">
    <button class="date-picker" id="dateTriggerBtn">📅 今天</button>
    <button class="backup-btn" id="manualBackupBtn" title="备份">💾</button>
  </div>

  <div class="main-content">
    <!-- 分类区域 -->
    <div class="section">
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <!-- 用途输入框（放在账户前面） -->
    <input type="text" id="purposeInput" class="purpose-input" placeholder="用途" autocomplete="off">

    <!-- 账户网格（放在用途后面） -->
    <div class="account-grid" id="accountGrid"></div>

    <!-- 金额显示 - 右对齐 -->
    <div class="amount-area">
      <div class="amount-value" id="amountDisplay">0</div>
    </div>

    <!-- 数字键盘 -->
    <div class="keyboard">
      <div class="key-row">
        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key key-del" data-action="del">⌫</button>
      </div>
      <div class="key-row">
        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key key-confirm" data-action="confirm">✓</button>
      </div>
      <div class="key-row">
        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key" data-action="clear" style="background:#e5e5ea;">C</button>
      </div>
      <div class="key-row">
        <button class="key key-zero" data-num="0">0</button>
        <button class="key" data-num=".">.</button>
      </div>
    </div>
  </div>

  <!-- 历史记录 -->
  <div class="history-section">
    <div class="history-header">📋 最近</div>
    <div id="historyList"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<input type="date" id="hiddenDatePicker" class="hidden-date-input">

<script>
  // 分类配置
  const CATEGORIES = [
    { name: "餐饮", icon: "🍜" }, { name: "交通", icon: "🚗" },
    { name: "购物", icon: "🛒" }, { name: "娱乐", icon: "🎬" },
    { name: "住房", icon: "🏠" }, { name: "宝宝", icon: "👶" },
    { name: "医疗", icon: "💊" }, { name: "其他", icon: "📦" }
  ];

  // 账户配置（带图标）
  const ACCOUNTS = [
    { name: "现金", icon: "💵" },
    { name: "信用卡", icon: "💳" },
    { name: "借记卡", icon: "🏦" },
    { name: "微信/支付宝", icon: "📱" }
  ];

  let db;
  let records = [];
  let currentAmount = "0";
  let selectedCategory = "餐饮";
  let selectedAccount = "现金";
  let currentDate = new Date();

  // 注册 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
  }

  // PWA 安装提示
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('installBanner');
    banner.style.display = 'block';
    banner.onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        banner.style.display = 'none';
      });
    };
  });

  // 初始化数据库
  const request = indexedDB.open("ledger_pwa", 1);
  request.onupgradeneeded = e => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("records")) {
      db.createObjectStore("records", { keyPath: "id" });
    }
  };
  request.onsuccess = e => {
    db = e.target.result;
    loadRecords();
  };

  function loadRecords() {
    const tx = db.transaction("records", "readonly");
    const req = tx.objectStore("records").getAll();
    req.onsuccess = () => {
      records = req.result.sort((a,b) => b.date.localeCompare(a.date));
      renderHistory();
    };
  }

  // 渲染分类按钮
  function renderCatButtons() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = CATEGORIES.map(cat => `
      <div class="cat-item" data-cat="${cat.name}">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-name">${cat.name}</div>
      </div>
    `).join('');
    
    document.querySelectorAll('.cat-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = btn.getAttribute('data-cat');
      });
    });
    // 默认选中第一个
    document.querySelector('.cat-item')?.classList.add('active');
  }

  // 渲染账户按钮（网格形式）
  function renderAccountButtons() {
    const grid = document.getElementById('accountGrid');
    grid.innerHTML = ACCOUNTS.map(acc => `
      <div class="account-item" data-account="${acc.name}">
        <div class="account-icon">${acc.icon}</div>
        <div class="account-name">${acc.name}</div>
      </div>
    `).join('');
    
    document.querySelectorAll('.account-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.account-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAccount = btn.getAttribute('data-account');
      });
    });
    // 默认选中"现金"
    const defaultAccount = document.querySelector('.account-item[data-account="现金"]');
    if (defaultAccount) defaultAccount.classList.add('active');
  }

  // 键盘逻辑
  function setupKeyboard() {
    const amountDisplay = document.getElementById('amountDisplay');
    function updateDisplay() {
      let num = parseFloat(currentAmount);
      if (isNaN(num)) num = 0;
      if (currentAmount === "") currentAmount = "0";
      amountDisplay.innerText = parseFloat(currentAmount).toFixed(2);
    }
    
    document.querySelectorAll('[data-num]').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.getAttribute('data-num');
        if (val === '.' && currentAmount.includes('.')) return;
        if (currentAmount === "0" && val !== '.') currentAmount = val;
        else currentAmount += val;
        updateDisplay();
      });
    });
    
    document.querySelector('[data-action="del"]').addEventListener('click', () => {
      if (currentAmount.length > 1) currentAmount = currentAmount.slice(0, -1);
      else currentAmount = "0";
      updateDisplay();
    });
    
    document.querySelector('[data-action="clear"]').addEventListener('click', () => {
      currentAmount = "0";
      updateDisplay();
    });
    
    document.querySelector('[data-action="confirm"]').addEventListener('click', () => saveRecord());
  }

  // 保存记录
  function saveRecord() {
    const amount = parseFloat(currentAmount);
    const purpose = document.getElementById('purposeInput').value.trim();
    
    if (isNaN(amount) || amount <= 0) { showToast("请输入金额"); return; }
    if (!selectedCategory) { showToast("请选择分类"); return; }
    if (!purpose) { showToast("请填写用途"); return; }
    
    const dateStr = currentDate.toISOString().split('T')[0];
    const record = {
      id: Date.now(),
      date: dateStr,
      amount: amount,
      desc: purpose,
      cat: selectedCategory,
      acct: selectedAccount,
      type: 'out'
    };
    
    const tx = db.transaction("records", "readwrite");
    tx.objectStore("records").add(record);
    tx.oncomplete = () => {
      records.unshift(record);
      renderHistory();
      document.getElementById('purposeInput').value = '';
      currentAmount = "0";
      document.getElementById('amountDisplay').innerText = "0.00";
      showToast(`支出 ${amount.toFixed(2)}`);
      performAutoBackup();
    };
  }

  // 自动备份
  function performAutoBackup() {
    if (!records.length) return;
    try {
      const backupData = { time: new Date().toISOString(), records };
      const jsonStr = JSON.stringify(backupData, null, 2);
      const blob = new Blob([jsonStr], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      a.download = `ledger_${timestamp}.json`;
      a.href = url;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      let backups = JSON.parse(localStorage.getItem('ledger_backup_list') || '[]');
      backups.push({ time: timestamp });
      while (backups.length > 3) backups.shift();
      localStorage.setItem('ledger_backup_list', JSON.stringify(backups));
    } catch(e) { console.warn(e); }
  }

  function manualBackup() { performAutoBackup(); showToast("备份完成"); }

  // 历史记录渲染
  function renderHistory() {
    const container = document.getElementById('historyList');
    if (!records.length) {
      container.innerHTML = '<div class="empty-history">暂无记录</div>';
      return;
    }
    container.innerHTML = records.slice(0, 20).map(r => `
      <div class="history-item">
        <div>
          <div class="history-detail">
            <span>${escapeHtml(r.desc)}</span>
            <span class="history-cat">${r.cat}</span>
          </div>
          <div class="history-meta">${r.date} · ${r.acct}</div>
        </div>
        <div class="history-amount">-${r.amount.toFixed(2)}</div>
      </div>
    `).join('');
  }

  // 日期选择
  function setupDatePicker() {
    const dateBtn = document.getElementById('dateTriggerBtn');
    const hiddenPicker = document.getElementById('hiddenDatePicker');
    
    function updateDateBtn() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      const day = currentDate.getDate();
      dateBtn.innerText = `📅 ${year}.${month}.${day}`;
    }
    
    dateBtn.addEventListener('click', () => {
      hiddenPicker.value = currentDate.toISOString().split('T')[0];
      hiddenPicker.showPicker();
    });
    
    hiddenPicker.addEventListener('change', (e) => {
      currentDate = new Date(e.target.value);
      updateDateBtn();
    });
    
    updateDateBtn();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // 初始化
  renderCatButtons();
  renderAccountButtons();
  setupKeyboard();
  setupDatePicker();
  document.getElementById('manualBackupBtn').addEventListener('click', manualBackup);
</script>
</body>
</html>
