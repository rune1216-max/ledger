<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>记账本</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    background: #f5f5f7;
    font-family: system-ui, -apple-system, 'Arial Narrow', '仿宋', 'FangSong', '幼圆', 'YouYuan', sans-serif;
    color: #1c1c1e;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .app {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* 页面切换 */
  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    transition: transform 0.3s ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .page-main {
    transform: translateX(0);
    z-index: 2;
  }
  .page-summary {
    transform: translateX(100%);
    z-index: 1;
  }
  .page-ledger {
    transform: translateX(100%);
    z-index: 1;
  }
  .page-main.slide-out-left {
    transform: translateX(-100%);
  }
  .page-summary.slide-in {
    transform: translateX(0);
    z-index: 3;
  }
  .page-ledger.slide-in {
    transform: translateX(0);
    z-index: 3;
  }

  /* 顶部栏 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #efeff4;
    flex-shrink: 0;
  }
  .top-bar-left {
    display: flex;
    gap: 8px;
  }
  .date-picker {
    background: #f2f2f6;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    color: #ff9f0a;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .nav-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 6px 12px;
    color: #ff9f0a;
    font-weight: 500;
  }
  .import-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 6px 10px;
    color: #ff9f0a;
  }

  /* 主内容区 */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px 16px 0 16px;
  }

  .section {
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .cat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f9f9fb;
    padding: 8px 0 6px;
    border-radius: 16px;
    border: 1px solid #e9e9ef;
    cursor: pointer;
    transition: all 0.1s;
  }
  .cat-item.active {
    background: #fff2e6;
    border-color: #ff9f0a;
  }
  .cat-icon { font-size: 24px; }
  .cat-name { font-size: 11px; font-weight: 500; margin-top: 4px; color: #3a3a3c; }

  .purpose-input {
    width: 100%;
    background: #f9f9fb;
    border: 1px solid #e9e9ef;
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }
  .purpose-input:focus {
    border-color: #ff9f0a;
  }

  .account-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .account-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f9f9fb;
    padding: 8px 0 6px;
    border-radius: 16px;
    border: 1px solid #e9e9ef;
    cursor: pointer;
    transition: all 0.1s;
  }
  .account-item.active {
    background: #fff2e6;
    border-color: #ff9f0a;
  }
  .account-icon { font-size: 22px; }
  .account-name { font-size: 10px; font-weight: 500; margin-top: 4px; color: #3a3a3c; }

  .amount-area {
    text-align: right;
    padding: 8px 4px 12px 4px;
    border-bottom: 1px solid #efeff4;
    margin-bottom: 12px;
  }
  .amount-value {
    font-size: 48px;
    font-weight: 700;
    font-family: 'Arial Narrow', monospace;
    color: #1c1c1e;
    line-height: 1;
    letter-spacing: -1px;
  }

  .keyboard {
    background: #ffffff;
    padding: 8px 0 16px;
  }
  .key-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .key {
    flex: 1;
    background: #f2f2f6;
    border: none;
    border-radius: 50px;
    padding: 14px 0;
    font-size: 26px;
    font-weight: 500;
    font-family: monospace;
    color: #1c1c1e;
    cursor: pointer;
    text-align: center;
  }
  .key:active {
    background: #e5e5ea;
    transform: scale(0.96);
  }
  .key-zero { flex: 2.2; }
  .key-confirm { background: #ff9f0a; color: white; font-size: 28px; font-weight: 600; }
  .key-del { background: #e5e5ea; font-size: 22px; }

  .summary-header, .ledger-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #efeff4;
    gap: 12px;
  }
  .back-btn {
    background: #f2f2f6;
    border: none;
    border-radius: 30px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .page-title { font-size: 18px; font-weight: 600; flex: 1; }
  .filter-bar {
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    border-bottom: 1px solid #efeff4;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: #f2f2f6;
    border: none;
    border-radius: 30px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .filter-btn.active { background: #ff9f0a; color: white; }
  .summary-table, .ledger-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .table-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #efeff4; }
  .table-header { font-weight: 600; color: #8e8e93; font-size: 12px; }
  .table-amount { font-weight: 600; color: #ff3b30; font-family: monospace; }
  .empty-summary { text-align: center; color: #aeaeb2; padding: 40px; }

  .ledger-item { background: #f9f9fb; border-radius: 16px; padding: 12px; margin-bottom: 12px; border: 1px solid #e9e9ef; }
  .ledger-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .ledger-date { font-size: 12px; color: #8e8e93; }
  .ledger-amount { font-weight: 700; color: #ff3b30; font-size: 16px; }
  .ledger-detail { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .ledger-cat { background: #e9e9ef; padding: 2px 10px; border-radius: 20px; font-size: 11px; }
  .ledger-acct { font-size: 11px; color: #8e8e93; }
  .ledger-desc { font-size: 14px; font-weight: 500; flex: 1; }
  .ledger-actions { display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #e9e9ef; padding-top: 10px; }
  .edit-btn, .delete-btn { background: none; border: none; font-size: 14px; cursor: pointer; padding: 4px 12px; border-radius: 20px; }
  .edit-btn { color: #ff9f0a; background: #fff2e6; }
  .delete-btn { color: #ff3b30; background: #ffe6e5; }

  .edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .edit-card { background: white; margin: 20px; padding: 20px; border-radius: 28px; width: calc(100% - 40px); max-width: 400px; }
  .edit-card input, .edit-card select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e9e9ef; border-radius: 12px; font-size: 14px; }
  .edit-actions { display: flex; gap: 12px; margin-top: 16px; }
  .edit-actions button { flex: 1; padding: 12px; border-radius: 30px; border: none; cursor: pointer; }
  .save-btn { background: #ff9f0a; color: white; }
  .cancel-btn { background: #e9e9ef; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(28, 28, 30, 0.9);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    opacity: 0;
    transition: all 0.15s ease;
    pointer-events: none;
    z-index: 1000;
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .hidden-date-input { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
  .install-banner { background: #ff9f0a; padding: 6px 12px; text-align: center; font-size: 11px; font-weight: 500; color: white; display: none; flex-shrink: 0; }
</style>
</head>
<body>

<div class="app">
  <div id="installBanner" class="install-banner">📱 点击浏览器菜单 → 安装应用</div>

  <div id="mainPage" class="page page-main">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="nav-btn" id="openLedgerBtn">📋 流水</button>
        <button class="nav-btn" id="openSummaryBtn">📊 汇总</button>
      </div>
      <div>
        <button class="date-picker" id="dateTriggerBtn">📅 加载中...</button>
        <button class="import-btn" id="importBtn" title="恢复最后一次备份">📂 导入</button>
      </div>
    </div>

    <div class="main-content">
      <div class="section">
        <div class="cat-grid" id="catGrid"></div>
      </div>
      <input type="text" id="purposeInput" class="purpose-input" placeholder="用途" autocomplete="off">
      <div class="account-grid" id="accountGrid"></div>
      <div class="amount-area">
        <div class="amount-value" id="amountDisplay">0.00</div>
      </div>
      <div class="keyboard">
        <div class="key-row">
          <button class="key" data-num="1">1</button>
          <button class="key" data-num="2">2</button>
          <button class="key" data-num="3">3</button>
          <button class="key key-del" data-action="del">⌫</button>
        </div>
        <div class="key-row">
          <button class="key" data-num="4">4</button>
          <button class="key" data-num="5">5</button>
          <button class="key" data-num="6">6</button>
          <button class="key key-confirm" data-action="confirm">✓</button>
        </div>
        <div class="key-row">
          <button class="key" data-num="7">7</button>
          <button class="key" data-num="8">8</button>
          <button class="key" data-num="9">9</button>
          <button class="key" data-action="clear" style="background:#e5e5ea;">C</button>
        </div>
        <div class="key-row">
          <button class="key key-zero" data-num="0">0</button>
          <button class="key" data-num=".">.</button>
        </div>
      </div>
    </div>
  </div>

  <div id="summaryPage" class="page page-summary">
    <div class="summary-header">
      <button class="back-btn" id="closeSummaryBtn">← 返回</button>
      <span class="page-title">📊 汇总</span>
      <div style="width: 60px;"></div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn" data-type="day">日汇总</button>
      <button class="filter-btn active" data-type="month">月汇总</button>
    </div>
    <div class="filter-bar">
      <button class="filter-btn" data-group="category">按分类</button>
      <button class="filter-btn active" data-group="account">按账户</button>
    </div>
    <div class="summary-table" id="summaryTable">
      <div class="empty-summary">加载中...</div>
    </div>
  </div>

  <div id="ledgerPage" class="page page-ledger">
    <div class="ledger-header">
      <button class="back-btn" id="closeLedgerBtn">← 返回</button>
      <span class="page-title">📋 流水账</span>
      <div style="width: 60px;"></div>
    </div>
    <div class="ledger-list" id="ledgerList">
      <div class="empty-summary">加载中...</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<input type="date" id="hiddenDatePicker" class="hidden-date-input">

<script>
  // 分类配置
  const CATEGORIES = [
    { name: "餐饮", icon: "🍜" }, { name: "交通", icon: "🚗" },
    { name: "购物", icon: "🛒" }, { name: "娱乐", icon: "🎬" },
    { name: "住房", icon: "🏠" }, { name: "宝宝", icon: "👶" },
    { name: "日用", icon: "🧴" }, { name: "其他", icon: "📦" }
  ];

  // 账户配置
  const ACCOUNTS = [
    { name: "现金", icon: "💵" }, { name: "信用卡", icon: "💳" },
    { name: "借记卡", icon: "🏦" }, { name: "微信", icon: "💬" }
  ];

  const MAX_BACKUPS = 3;
  let db;
  let records = [];
  let currentAmount = "0";
  let selectedCategory = "餐饮";
  let selectedAccount = "现金";
  let currentDate = new Date(); // 默认今天

  let summaryType = "month";
  let summaryGroup = "account";
  let toastTimer = null;

  function showToast(msg) {
    const toast = document.getElementById('toast');
    if (toastTimer) clearTimeout(toastTimer);
    toast.innerText = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 800);
  }

  // 数据库初始化
  const request = indexedDB.open("ledger_pwa_v2", 2);
  request.onupgradeneeded = e => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("records")) {
      db.createObjectStore("records", { keyPath: "id" });
    }
    if (!db.objectStoreNames.contains("backups")) {
      db.createObjectStore("backups", { keyPath: "slot" });
    }
  };
  request.onsuccess = e => {
    db = e.target.result;
    // 申请持久化存储
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }
    loadRecords();
  };

  function loadRecords() {
    const tx = db.transaction("records", "readonly");
    const req = tx.objectStore("records").getAll();
    req.onsuccess = () => {
      records = req.result.sort((a,b) => b.date.localeCompare(a.date));
      renderLedgerList();
    };
  }

  function refreshAll() {
    const tx = db.transaction("records", "readonly");
    const req = tx.objectStore("records").getAll();
    req.onsuccess = () => {
      records = req.result.sort((a,b) => b.date.localeCompare(a.date));
      renderLedgerList();
      if (document.getElementById('summaryPage').classList.contains('slide-in')) refreshSummary();
    };
  }

  // 自动循环备份 (静默存储)
  function performAutoBackup() {
    if (!records.length) return;
    const tx = db.transaction("backups", "readwrite");
    const store = tx.objectStore("backups");

    let cursor = parseInt(localStorage.getItem('ledger_backup_slot') || "0");
    const nextSlot = (cursor + 1) % MAX_BACKUPS;

    store.put({
      slot: nextSlot,
      timestamp: Date.now(),
      data: JSON.parse(JSON.stringify(records))
    });
    localStorage.setItem('ledger_backup_slot', nextSlot);
    showToast("同步成功");
  }

  // 恢复备份
  function importBackup() {
    const tx = db.transaction("backups", "readonly");
    const req = tx.objectStore("backups").getAll();
    req.onsuccess = () => {
      const all = req.result;
      if (!all.length) { showToast("未找到备份"); return; }
      const latest = all.reduce((prev, curr) => (prev.timestamp > curr.timestamp) ? prev : curr);
      
      const writeTx = db.transaction("records", "readwrite");
      const store = writeTx.objectStore("records");
      store.clear();
      latest.data.forEach(r => store.add(r));
      writeTx.oncomplete = () => {
        showToast("已恢复最新记录");
        refreshAll();
      };
    };
  }

  function renderCatButtons() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = CATEGORIES.map(cat => `
      <div class="cat-item ${cat.name === selectedCategory ? 'active' : ''}" data-cat="${cat.name}">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-name">${cat.name}</div>
      </div>
    `).join('');
    document.querySelectorAll('.cat-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = btn.getAttribute('data-cat');
      });
    });
  }

  function renderAccountButtons() {
    const grid = document.getElementById('accountGrid');
    grid.innerHTML = ACCOUNTS.map(acc => `
      <div class="account-item ${acc.name === selectedAccount ? 'active' : ''}" data-account="${acc.name}">
        <div class="account-icon">${acc.icon}</div>
        <div class="account-name">${acc.name}</div>
      </div>
    `).join('');
    document.querySelectorAll('.account-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.account-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAccount = btn.getAttribute('data-account');
      });
    });
  }

  function setupKeyboard() {
    const display = document.getElementById('amountDisplay');
    function update() {
      display.innerText = parseFloat(currentAmount || "0").toFixed(2);
    }
    document.querySelectorAll('[data-num]').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.getAttribute('data-num');
        if (val === '.' && currentAmount.includes('.')) return;
        if (currentAmount === "0" && val !== '.') currentAmount = val;
        else currentAmount += val;
        update();
      });
    });
    document.querySelector('[data-action="del"]').onclick = () => {
      currentAmount = currentAmount.length > 1 ? currentAmount.slice(0, -1) : "0";
      update();
    };
    document.querySelector('[data-action="clear"]').onclick = () => { currentAmount = "0"; update(); };
    document.querySelector('[data-action="confirm"]').onclick = saveRecord;
  }

  function saveRecord() {
    const amt = parseFloat(currentAmount);
    const desc = document.getElementById('purposeInput').value.trim();
    if (!amt || amt <= 0 || !desc) { showToast("请完整填写金额和用途"); return; }
    
    const record = {
      id: Date.now(),
      date: currentDate.toISOString().split('T')[0],
      amount: amt,
      desc: desc,
      cat: selectedCategory,
      acct: selectedAccount
    };
    
    const tx = db.transaction("records", "readwrite");
    tx.objectStore("records").add(record);
    tx.oncomplete = () => {
      records.unshift(record);
      document.getElementById('purposeInput').value = '';
      currentAmount = "0";
      document.getElementById('amountDisplay').innerText = "0.00";
      showToast(`已记账 ¥${amt.toFixed(2)}`);
      renderLedgerList();
      performAutoBackup();
    };
  }

  window.deleteRecordById = (id) => {
    if (!confirm('确定删除？')) return;
    const tx = db.transaction("records", "readwrite");
    tx.objectStore("records").delete(id);
    tx.oncomplete = () => {
      records = records.filter(r => r.id !== id);
      renderLedgerList();
      refreshSummary();
      showToast("已删除");
      performAutoBackup();
    };
  };

  window.editRecordById = (id) => {
    const r = records.find(item => item.id === id);
    if (!r) return;
    const modal = document.createElement('div');
    modal.className = 'edit-modal';
    modal.innerHTML = `
      <div class="edit-card">
        <h3 style="margin:0 0 16px">编辑记录</h3>
        <input type="date" id="edit-date" value="${r.date}">
        <select id="edit-cat">${CATEGORIES.map(c=>`<option ${c.name===r.cat?'selected':''} value="${c.name}">${c.name}</option>`).join('')}</select>
        <select id="edit-acct">${ACCOUNTS.map(a=>`<option ${a.name===r.acct?'selected':''} value="${a.name}">${a.name}</option>`).join('')}</select>
        <input type="text" id="edit-desc" value="${r.desc.replace(/"/g,'&quot;')}" placeholder="用途">
        <input type="number" id="edit-amount" value="${r.amount}" step="0.01">
        <div class="edit-actions">
          <button class="cancel-btn" id="edit-cancel">取消</button>
          <button class="save-btn" id="edit-save">保存</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector('#edit-cancel').onclick = () => modal.remove();
    modal.querySelector('#edit-save').onclick = () => {
      const up = { ...r, 
        date: modal.querySelector('#edit-date').value,
        cat: modal.querySelector('#edit-cat').value,
        acct: modal.querySelector('#edit-acct').value,
        desc: modal.querySelector('#edit-desc').value.trim(),
        amount: parseFloat(modal.querySelector('#edit-amount').value)
      };
      const tx = db.transaction("records", "readwrite");
      tx.objectStore("records").put(up);
      tx.oncomplete = () => { modal.remove(); refreshAll(); performAutoBackup(); };
    };
  };

  function renderLedgerList() {
    const container = document.getElementById('ledgerList');
    if (!records.length) { container.innerHTML = '<div class="empty-summary">暂无记录</div>'; return; }
    container.innerHTML = records.map(r => `
      <div class="ledger-item">
        <div class="ledger-item-header">
          <span class="ledger-date">${r.date}</span>
          <span class="ledger-amount">-¥${r.amount.toFixed(2)}</span>
        </div>
        <div class="ledger-detail">
          <span class="ledger-cat">${r.cat}</span>
          <span class="ledger-acct">${r.acct}</span>
          <span class="ledger-desc">${r.desc}</span>
        </div>
        <div class="ledger-actions">
          <button class="edit-btn" onclick="window.editRecordById(${r.id})">✏️ 编辑</button>
          <button class="delete-btn" onclick="window.deleteRecordById(${r.id})">🗑️ 删除</button>
        </div>
      </div>
    `).join('');
  }

  function setupDatePicker() {
    const btn = document.getElementById('dateTriggerBtn');
    const picker = document.getElementById('hiddenDatePicker');
    // 初始化 picker 值为今天
    const todayStr = new Date().toLocaleDateString('en-CA'); 
    picker.value = todayStr;

    const update = () => {
      btn.innerText = `📅 ${currentDate.getFullYear()}.${currentDate.getMonth()+1}.${currentDate.getDate()}`;
    };
    btn.onclick = () => picker.showPicker();
    picker.onchange = (e) => {
      const p = e.target.value.split('-');
      currentDate = new Date(p[0], p[1]-1, p[2]);
      update();
    };
    update();
  }

  function refreshSummary() {
    const container = document.getElementById('summaryTable');
    if (!records.length) { container.innerHTML = '<div class="empty-summary">暂无数据</div>'; return; }
    
    let map = {};
    records.forEach(r => {
      let key = "";
      if (summaryType === 'day') key = r.date;
      else if (summaryType === 'month') key = r.date.substring(0, 7);
      
      let groupKey = summaryGroup === 'category' ? r.cat : r.acct;
      map[groupKey] = (map[groupKey] || 0) + r.amount;
    });

    let html = `<div class="table-row table-header"><span>${summaryGroup==='category'?'分类':'账户'}</span><span>支出</span></div>`;
    for (let [k, v] of Object.entries(map)) {
      html += `<div class="table-row"><span class="table-name">${k}</span><span class="table-amount">¥${v.toFixed(2)}</span></div>`;
    }
    container.innerHTML = html;
  }

  function initSummaryButtons() {
    document.querySelectorAll('.filter-btn[data-type]').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.filter-btn[data-type]').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); summaryType = b.dataset.type; refreshSummary();
      };
    });
    document.querySelectorAll('.filter-btn[data-group]').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.filter-btn[data-group]').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); summaryGroup = b.dataset.group; refreshSummary();
      };
    });
  }

  // 初始化所有组件
  renderCatButtons();
  renderAccountButtons();
  setupKeyboard();
  setupDatePicker();
  initSummaryButtons();
  document.getElementById('importBtn').onclick = importBackup;
  document.getElementById('openSummaryBtn').onclick = () => { 
    document.getElementById('mainPage').classList.add('slide-out-left');
    document.getElementById('summaryPage').classList.add('slide-in');
    refreshSummary();
  };
  document.getElementById('closeSummaryBtn').onclick = () => {
    document.getElementById('mainPage').classList.remove('slide-out-left');
    document.getElementById('summaryPage').classList.remove('slide-in');
  };
  document.getElementById('openLedgerBtn').onclick = () => {
    document.getElementById('mainPage').classList.add('slide-out-left');
    document.getElementById('ledgerPage').classList.add('slide-in');
    renderLedgerList();
  };
  document.getElementById('closeLedgerBtn').onclick = () => {
    document.getElementById('mainPage').classList.remove('slide-out-left');
    document.getElementById('ledgerPage').classList.remove('slide-in');
  };

  // Service Worker 注册
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
