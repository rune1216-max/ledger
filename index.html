<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>记账本 | 计算器式记账</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    margin: 0;
    background: #2c2c2e;
    font-family: 'Arial Narrow', 'Arial', 'STFangsong', '仿宋', 'YouYuan', '幼圆', monospace;
    font-weight: 400;
    color: #ffffff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* 主容器 */
  .app {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
    height: 100%;
    background: #1c1c1e;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  
  /* 头部显示区 */
  .display-area {
    background: #0a0a0c;
    padding: 20px 24px;
    padding-top: env(safe-area-inset-top, 20px);
    border-bottom: 1px solid #3a3a3c;
  }
  
  .date-row {
    font-size: 14px;
    color: #8e8e93;
    margin-bottom: 20px;
    font-family: 'Arial Narrow', monospace;
    display: flex;
    justify-content: space-between;
  }
  
  .amount-display {
    text-align: right;
    margin-bottom: 12px;
    font-family: 'Arial Narrow', monospace;
    font-weight: 700;
  }
  
  .amount-label {
    font-size: 14px;
    color: #8e8e93;
    letter-spacing: 1px;
  }
  
  .amount-number {
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
    word-break: break-all;
    min-height: 70px;
  }
  
  /* 记录卡片预览 */
  .preview-card {
    background: #2c2c2e;
    margin: 16px 20px;
    padding: 14px 18px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 15px;
  }
  .preview-label {
    color: #8e8e93;
  }
  .preview-value {
    font-weight: 600;
    font-family: 'Arial Narrow', monospace;
  }
  
  /* 表单区域 */
  .form-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px;
    margin-bottom: 8px;
  }
  
  .input-group {
    margin-bottom: 20px;
  }
  
  .input-label {
    font-size: 12px;
    color: #8e8e93;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    font-family: 'Arial Narrow', monospace;
  }
  
  .input-field {
    width: 100%;
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    font-family: 'Arial Narrow', 'STFangsong', '仿宋', monospace;
    color: white;
    outline: none;
    transition: 0.2s;
  }
  
  .input-field:focus {
    border-color: #ff9500;
  }
  
  select.input-field {
    cursor: pointer;
    appearance: none;
    background: #2c2c2e url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 16px center;
  }
  
  /* 分类按钮组 */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  
  .cat-btn {
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 30px;
    padding: 12px 0;
    text-align: center;
    font-size: 15px;
    font-family: 'Arial Narrow', 'STFangsong', '仿宋', monospace;
    color: #ffffff;
    cursor: pointer;
    transition: 0.1s;
  }
  
  .cat-btn.active {
    background: #ff9500;
    border-color: #ff9500;
    color: white;
    font-weight: 600;
  }
  
  .cat-btn:active {
    transform: scale(0.96);
  }
  
  /* 数字键盘 */
  .keyboard {
    background: #1c1c1e;
    padding: 12px 16px 20px;
    padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 10px);
    border-top: 1px solid #3a3a3c;
  }
  
  .keyboard-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  
  .key {
    flex: 1;
    background: #2c2c2e;
    border: none;
    border-radius: 12px;
    padding: 16px 0;
    font-size: 28px;
    font-family: 'Arial Narrow', monospace;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: 0.05s linear;
    text-align: center;
    box-shadow: 0 1px 0 #3a3a3c;
  }
  
  .key:active {
    background: #3a3a3c;
    transform: scale(0.96);
  }
  
  .key-zero {
    flex: 2.2;
  }
  
  .key-confirm {
    background: #ff9500;
    color: white;
    font-size: 20px;
    font-weight: 700;
  }
  
  .key-confirm:active {
    background: #e08600;
  }
  
  .key-del {
    background: #3a3a3c;
    font-size: 20px;
  }
  
  /* 历史记录区域 */
  .history-section {
    max-height: 240px;
    overflow-y: auto;
    margin-top: 8px;
    border-top: 1px solid #3a3a3c;
    padding-top: 12px;
  }
  
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  
  .history-title {
    font-size: 12px;
    color: #8e8e93;
    font-family: 'Arial Narrow', monospace;
  }
  
  .history-item {
    background: #2c2c2e;
    margin-bottom: 8px;
    padding: 12px 16px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .history-left {
    flex: 1;
  }
  
  .history-desc {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  
  .history-cat {
    font-size: 11px;
    background: #3a3a3c;
    padding: 2px 8px;
    border-radius: 20px;
    color: #aeaeb2;
  }
  
  .history-meta {
    font-size: 11px;
    color: #8e8e93;
    font-family: 'Arial Narrow', monospace;
  }
  
  .history-amount {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Arial Narrow', monospace;
    color: #ff9500;
  }
  
  .empty-history {
    text-align: center;
    padding: 24px;
    color: #8e8e93;
    font-size: 13px;
  }
  
  /* 滚动条 */
  ::-webkit-scrollbar {
    width: 4px;
  }
  ::-webkit-scrollbar-track {
    background: #1c1c1e;
  }
  ::-webkit-scrollbar-thumb {
    background: #3a3a3c;
    border-radius: 4px;
  }
  
  button {
    cursor: pointer;
  }
  
  .toast {
    position: fixed;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 13px;
    font-family: 'Arial Narrow', monospace;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.2s;
  }
  
  .backup-badge {
    background: #ff9500;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">
  <div class="display-area">
    <div class="date-row">
      <span id="current-date"></span>
      <span class="backup-badge" onclick="manualBackup()">💾 备份</span>
    </div>
    <div class="amount-display">
      <div class="amount-label">金额</div>
      <div class="amount-number" id="amount-display">0</div>
    </div>
  </div>
  
  <div class="preview-card">
    <span class="preview-label">当前记录</span>
    <span class="preview-value" id="preview-text">等待输入</span>
  </div>
  
  <div class="form-area">
    <div class="input-group">
      <div class="input-label">分类（必选）</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
    
    <div class="input-group">
      <div class="input-label">账户</div>
      <select id="account" class="input-field">
        <option value="现金">现金</option>
        <option value="信用卡">信用卡</option>
        <option value="借记卡">借记卡</option>
        <option value="微信/支付宝">微信/支付宝</option>
      </select>
    </div>
    
    <div class="input-group">
      <div class="input-label">内容（必填）</div>
      <input type="text" id="desc" class="input-field" placeholder="例：午餐 / 加油" autocomplete="off">
    </div>
    
    <!-- 最近记录 -->
    <div class="history-section" id="history-section">
      <div class="history-header">
        <span class="history-title">📋 最近支出</span>
        <span class="history-title" style="font-size:10px;" onclick="exportExcel()">📎 导出</span>
      </div>
      <div id="history-list"></div>
    </div>
  </div>
  
  <!-- 数字键盘 -->
  <div class="keyboard">
    <div class="keyboard-row">
      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key key-del" data-action="del">⌫</button>
    </div>
    <div class="keyboard-row">
      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key key-confirm" data-action="confirm">↵ 确认</button>
    </div>
    <div class="keyboard-row">
      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key" data-action="clear" style="background:#3a3a3c;">C</button>
    </div>
    <div class="keyboard-row">
      <button class="key key-zero" data-num="0">0</button>
      <button class="key" data-num=".">.</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
// 支出分类（无默认选中）
const CATEGORIES = ['餐饮', '交通', '购物', '娱乐', '住房', '宝宝', '其他'];

let db;
let records = [];
let currentAmount = "0";
let selectedCat = null;

// 初始化数据库
const request = indexedDB.open("ledger_calc", 1);
request.onupgradeneeded = e => {
  db = e.target.result;
  if (!db.objectStoreNames.contains("records")) {
    db.createObjectStore("records", { keyPath: "id" });
  }
};
request.onsuccess = e => {
  db = e.target.result;
  loadRecords();
};
request.onerror = () => showToast("数据库错误");

function loadRecords() {
  const tx = db.transaction("records", "readonly");
  const req = tx.objectStore("records").getAll();
  req.onsuccess = () => {
    records = req.result.sort((a,b) => b.date.localeCompare(a.date));
    renderHistory();
    updateDate();
  };
}

function updateDate() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('current-date').innerHTML = `${yyyy}.${mm}.${dd} 支出`;
}

// 渲染分类按钮（无默认选中）
function renderCatButtons() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = CATEGORIES.map(cat => `
    <div class="cat-btn" data-cat="${cat}">${cat}</div>
  `).join('');
  
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCat = btn.getAttribute('data-cat');
      updatePreview();
    });
  });
}

// 更新预览文字
function updatePreview() {
  const desc = document.getElementById('desc').value.trim();
  const amountNum = parseFloat(currentAmount);
  const account = document.getElementById('account').value;
  const catName = selectedCat || '未选';
  const amountShow = isNaN(amountNum) ? '0' : amountNum.toFixed(2);
  document.getElementById('preview-text').innerHTML = `${catName} · ${desc || '无内容'} · ${account} · ¥${amountShow}`;
}

// 数字键盘逻辑
function setupKeyboard() {
  const amountDisplay = document.getElementById('amount-display');
  
  function updateDisplay() {
    let num = parseFloat(currentAmount);
    if(isNaN(num)) num = 0;
    if(currentAmount === "") currentAmount = "0";
    amountDisplay.innerText = parseFloat(currentAmount).toFixed(2);
    updatePreview();
  }
  
  document.querySelectorAll('[data-num]').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.getAttribute('data-num');
      if(val === '.' && currentAmount.includes('.')) return;
      if(currentAmount === "0" && val !== '.') currentAmount = val;
      else currentAmount += val;
      updateDisplay();
    });
  });
  
  document.querySelector('[data-action="del"]').addEventListener('click', () => {
    if(currentAmount.length > 1) currentAmount = currentAmount.slice(0, -1);
    else currentAmount = "0";
    updateDisplay();
  });
  
  document.querySelector('[data-action="clear"]').addEventListener('click', () => {
    currentAmount = "0";
    updateDisplay();
  });
  
  document.querySelector('[data-action="confirm"]').addEventListener('click', () => {
    saveRecord();
  });
}

// 保存支出记录
async function saveRecord() {
  const amount = parseFloat(currentAmount);
  const desc = document.getElementById('desc').value.trim();
  const account = document.getElementById('account').value;
  
  // 必填验证
  if(isNaN(amount) || amount <= 0) {
    showToast("❌ 请输入有效金额");
    return false;
  }
  if(!selectedCat) {
    showToast("❌ 请选择分类");
    return false;
  }
  if(!desc) {
    showToast("❌ 请填写内容");
    return false;
  }
  
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const dateStr = `${yyyy}-${mm}-${dd}`;
  
  const record = {
    id: Date.now(),
    date: dateStr,
    amount: amount,
    desc: desc,
    cat: selectedCat,
    acct: account,
    type: 'out'
  };
  
  const tx = db.transaction("records", "readwrite");
  tx.objectStore("records").add(record);
  tx.oncomplete = () => {
    records.unshift(record);
    renderHistory();
    // 清空输入，保留账户和分类状态
    document.getElementById('desc').value = '';
    currentAmount = "0";
    document.getElementById('amount-display').innerText = "0.00";
    // 不清空选中的分类（保留高亮，但用户可选新的）
    updatePreview();
    showToast(`✅ 支出 ${amount.toFixed(2)} 已记录`);
    
    // 自动备份
    performAutoBackup();
  };
  tx.onerror = () => showToast("保存失败");
  return true;
}

// 自动备份（循环3个）
function performAutoBackup() {
  if(records.length === 0) return;
  try {
    const backupData = {
      version: "calc",
      time: new Date().toISOString(),
      totalRecords: records.length,
      records: records
    };
    const jsonStr = JSON.stringify(backupData, null, 2);
    const blob = new Blob([jsonStr], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = `ledger_${timestamp}.json`;
    a.href = url;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    // 循环覆盖：保存最近3个备份记录
    let backups = getBackupList();
    backups.push({ time: timestamp, date: new Date().toISOString(), count: records.length });
    while(backups.length > 3) backups.shift();
    localStorage.setItem('ledger_backup_list', JSON.stringify(backups));
    showToast("💾 自动备份完成");
  } catch(e) {
    showToast("⚠️ 自动备份失败");
  }
}

function getBackupList() {
  const saved = localStorage.getItem('ledger_backup_list');
  return saved ? JSON.parse(saved) : [];
}

function manualBackup() {
  if(records.length === 0 && !confirm("暂无数据，备份空文件？")) return;
  performAutoBackup();
  showToast("✅ 手动备份完成");
}

// 渲染历史记录（最近20条）
function renderHistory() {
  const container = document.getElementById('history-list');
  if(!records.length) {
    container.innerHTML = '<div class="empty-history">暂无支出记录<br>输入金额后点确认</div>';
    return;
  }
  const latest = records.slice(0, 30);
  container.innerHTML = latest.map(r => `
    <div class="history-item">
      <div class="history-left">
        <div class="history-desc">
          ${escapeHtml(r.desc)}
          <span class="history-cat">${r.cat}</span>
        </div>
        <div class="history-meta">${r.date} · ${r.acct}</div>
      </div>
      <div class="history-amount">-${r.amount.toFixed(2)}</div>
    </div>
  `).join('');
}

function exportExcel() {
  if(!records.length) { showToast("暂无数据"); return; }
  // 动态加载 xlsx 库（简单处理）
  const script = document.createElement('script');
  script.src = "https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js";
  script.onload = () => {
    const ws = XLSX.utils.json_to_sheet(records.map(r => ({
      '日期': r.date, '金额': r.amount, '内容': r.desc, '分类': r.cat, '账户': r.acct
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "支出记录");
    XLSX.writeFile(wb, `支出记录_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast("导出成功");
  };
  script.onerror = () => showToast("导出库加载失败");
  document.head.appendChild(script);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.style.opacity = '1';
  setTimeout(() => toast.style.opacity = '0', 2000);
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
}

// 监听输入变化
document.getElementById('desc').addEventListener('input', () => updatePreview());
document.getElementById('account').addEventListener('change', () => updatePreview());

// 初始化
renderCatButtons();
setupKeyboard();
updateDate();
updatePreview();
</script>
</body>
</html>
