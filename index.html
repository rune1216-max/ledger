<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<!-- PWA 配置 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<link rel="apple-touch-icon" href="icon.png">
<title>记账本 | 流水账</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    margin: 0;
    background: #f5f5f7;
    font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans', 'Arial Narrow', '仿宋', 'FangSong', '幼圆', 'YouYuan', sans-serif;
    color: #1c1c1e;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .app {
    max-width: 550px;
    margin: 0 auto;
    width: 100%;
    background: #ffffff;
    border-radius: 32px 32px 0 0;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 12px 20px;
    scrollbar-width: thin;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #6c6c70;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px 12px;
    margin-bottom: 28px;
  }

  .cat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f9f9fb;
    padding: 12px 0 8px;
    border-radius: 20px;
    transition: all 0.1s ease;
    border: 1px solid transparent;
    cursor: pointer;
  }

  .cat-item.active {
    background: #fff2e6;
    border-color: #ff9f0a;
  }

  .cat-icon {
    font-size: 28px;
    margin-bottom: 6px;
  }

  .cat-name {
    font-size: 12px;
    font-weight: 500;
    color: #3a3a3c;
  }

  .row-field {
    background: #f9f9fb;
    border-radius: 20px;
    padding: 8px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid #e9e9ef;
  }

  .field-icon {
    font-size: 22px;
    color: #ff9f0a;
    width: 32px;
    text-align: center;
  }

  .field-input, .field-select {
    flex: 1;
    border: none;
    background: transparent;
    padding: 14px 0;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    color: #1c1c1e;
  }

  .field-select {
    cursor: pointer;
  }

  .amount-area {
    background: #ffffff;
    padding: 12px 20px 0 20px;
    border-top: 1px solid #efeff4;
    margin-top: 8px;
  }

  .amount-label {
    font-size: 13px;
    color: #8e8e93;
    margin-bottom: 6px;
  }

  .amount-value {
    font-size: 52px;
    font-weight: 700;
    font-family: 'Arial Narrow', 'SF Mono', monospace;
    color: #1c1c1e;
    line-height: 1.1;
    word-break: break-all;
    letter-spacing: -1px;
  }

  .keyboard {
    background: #ffffff;
    padding: 16px 16px 28px;
    border-top: 1px solid #e9e9ef;
  }

  .key-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }

  .key {
    flex: 1;
    background: #f2f2f6;
    border: none;
    border-radius: 60px;
    padding: 18px 0;
    font-size: 28px;
    font-weight: 500;
    font-family: 'Arial Narrow', monospace;
    color: #1c1c1e;
    cursor: pointer;
    transition: 0.05s linear;
    text-align: center;
  }

  .key:active {
    background: #e5e5ea;
    transform: scale(0.96);
  }

  .key-zero {
    flex: 2.2;
  }

  .key-confirm {
    background: #ff9f0a;
    color: white;
    font-weight: 700;
    font-size: 22px;
  }

  .key-confirm:active {
    background: #e08e00;
  }

  .key-del {
    background: #e5e5ea;
    font-size: 24px;
  }

  .date-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 20px 0 20px;
    background: white;
  }

  .date-picker {
    background: #f2f2f6;
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    color: #ff9f0a;
    border: none;
    font-family: inherit;
    cursor: pointer;
  }

  .backup-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 6px;
  }

  .history-section {
    background: #ffffff;
    margin-top: 12px;
    border-top: 1px solid #efeff4;
    padding: 12px 20px;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-header {
    font-size: 13px;
    font-weight: 500;
    color: #8e8e93;
    margin-bottom: 12px;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #efeff4;
  }

  .history-detail {
    font-size: 15px;
    font-weight: 500;
  }

  .history-cat {
    font-size: 11px;
    background: #f2f2f6;
    padding: 2px 10px;
    border-radius: 30px;
    margin-left: 8px;
  }

  .history-amount {
    font-weight: 700;
    color: #ff3b30;
    font-family: monospace;
  }

  .empty-history {
    text-align: center;
    color: #aeaeb2;
    padding: 20px;
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c1e;
    color: white;
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 999;
  }

  .hidden-date-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
  }
  
  .install-banner {
    background: #ff9f0a;
    padding: 10px 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: white;
    display: none;
  }
</style>
</head>
<body>

<div class="app">
  <div id="installBanner" class="install-banner">
    📱 点击浏览器菜单 → 安装应用
  </div>
  
  <div class="date-bar">
    <button class="date-picker" id="dateTriggerBtn">📅 今天</button>
    <button class="backup-btn" id="manualBackupBtn" title="手动备份">💾 备份</button>
  </div>

  <div class="scroll-area">
    <div class="section-title"><span>🏷️ 分类</span></div>
    <div class="cat-grid" id="catGrid"></div>

    <div class="row-field">
      <span class="field-icon">💳</span>
      <select id="accountSelect" class="field-select">
        <option value="现金">现金</option>
        <option value="信用卡">信用卡</option>
        <option value="借记卡">借记卡</option>
        <option value="微信/支付宝">微信/支付宝</option>
      </select>
    </div>

    <div class="row-field">
      <span class="field-icon">📝</span>
      <input type="text" id="purposeInput" class="field-input" placeholder="用途 (必填)" autocomplete="off">
    </div>
  </div>

  <div class="amount-area">
    <div class="amount-label">💰 金额</div>
    <div class="amount-value" id="amountDisplay">0</div>
  </div>

  <div class="keyboard">
    <div class="key-row">
      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key key-del" data-action="del">⌫</button>
    </div>
    <div class="key-row">
      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key key-confirm" data-action="confirm">↵ 记一笔</button>
    </div>
    <div class="key-row">
      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key" data-action="clear" style="background:#e5e5ea;">C</button>
    </div>
    <div class="key-row">
      <button class="key key-zero" data-num="0">0</button>
      <button class="key" data-num=".">.</button>
    </div>
  </div>

  <div class="history-section">
    <div class="history-header">📋 最近支出</div>
    <div id="historyList"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<input type="date" id="hiddenDatePicker" class="hidden-date-input">

<script>
  const CATEGORIES = [
    { name: "餐饮", icon: "🍜" }, { name: "交通", icon: "🚗" },
    { name: "购物", icon: "🛒" }, { name: "娱乐", icon: "🎬" },
    { name: "住房", icon: "🏠" }, { name: "宝宝", icon: "👶" },
    { name: "医疗", icon: "💊" }, { name: "其他", icon: "📦" }
  ];

  let db;
  let records = [];
  let currentAmount = "0";
  let selectedCategory = "餐饮";
  let currentDate = new Date();

  // 注册 Service Worker（PWA 必需）
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => {
      console.log('SW registered');
    }).catch(err => console.log('SW failed:', err));
  }

  // 检测是否可以安装
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'block';
    document.getElementById('installBanner').onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        document.getElementById('installBanner').style.display = 'none';
      });
    };
  });

  // 初始化数据库
  const request = indexedDB.open("ledger_pwa", 1);
  request.onupgradeneeded = e => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("records")) {
      db.createObjectStore("records", { keyPath: "id" });
    }
  };
  request.onsuccess = e => {
    db = e.target.result;
    loadRecords();
  };

  function loadRecords() {
    const tx = db.transaction("records", "readonly");
    const req = tx.objectStore("records").getAll();
    req.onsuccess = () => {
      records = req.result.sort((a,b) => b.date.localeCompare(a.date));
      renderHistory();
    };
  }

  function renderCatButtons() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = CATEGORIES.map(cat => `
      <div class="cat-item" data-cat="${cat.name}">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-name">${cat.name}</div>
      </div>
    `).join('');
    
    document.querySelectorAll('.cat-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = btn.getAttribute('data-cat');
      });
    });
    // 默认选中第一个
    document.querySelector('.cat-item')?.classList.add('active');
    selectedCategory = "餐饮";
  }

  function setupKeyboard() {
    const amountDisplay = document.getElementById('amountDisplay');
    function updateDisplay() {
      let num = parseFloat(currentAmount);
      if (isNaN(num)) num = 0;
      if (currentAmount === "") currentAmount = "0";
      amountDisplay.innerText = parseFloat(currentAmount).toFixed(2);
    }
    
    document.querySelectorAll('[data-num]').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.getAttribute('data-num');
        if (val === '.' && currentAmount.includes('.')) return;
        if (currentAmount === "0" && val !== '.') currentAmount = val;
        else currentAmount += val;
        updateDisplay();
      });
    });
    
    document.querySelector('[data-action="del"]').addEventListener('click', () => {
      if (currentAmount.length > 1) currentAmount = currentAmount.slice(0, -1);
      else currentAmount = "0";
      updateDisplay();
    });
    
    document.querySelector('[data-action="clear"]').addEventListener('click', () => {
      currentAmount = "0";
      updateDisplay();
    });
    
    document.querySelector('[data-action="confirm"]').addEventListener('click', () => saveRecord());
  }

  function saveRecord() {
    const amount = parseFloat(currentAmount);
    const purpose = document.getElementById('purposeInput').value.trim();
    const account = document.getElementById('accountSelect').value;
    
    if (isNaN(amount) || amount <= 0) { showToast("❌ 请输入金额"); return; }
    if (!selectedCategory) { showToast("❌ 请选择分类"); return; }
    if (!purpose) { showToast("❌ 请填写用途"); return; }
    
    const dateStr = currentDate.toISOString().split('T')[0];
    const record = {
      id: Date.now(),
      date: dateStr,
      amount: amount,
      desc: purpose,
      cat: selectedCategory,
      acct: account,
      type: 'out'
    };
    
    const tx = db.transaction("records", "readwrite");
    tx.objectStore("records").add(record);
    tx.oncomplete = () => {
      records.unshift(record);
      renderHistory();
      document.getElementById('purposeInput').value = '';
      currentAmount = "0";
      document.getElementById('amountDisplay').innerText = "0.00";
      showToast(`✅ 支出 ${amount.toFixed(2)}`);
      performAutoBackup();
    };
  }

  function performAutoBackup() {
    if (!records.length) return;
    try {
      const backupData = { time: new Date().toISOString(), records };
      const jsonStr = JSON.stringify(backupData, null, 2);
      const blob = new Blob([jsonStr], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      a.download = `ledger_${timestamp}.json`;
      a.href = url;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      let backups = JSON.parse(localStorage.getItem('ledger_backup_list') || '[]');
      backups.push({ time: timestamp });
      while (backups.length > 3) backups.shift();
      localStorage.setItem('ledger_backup_list', JSON.stringify(backups));
    } catch(e) { console.warn(e); }
  }

  function manualBackup() { performAutoBackup(); showToast("✅ 备份完成"); }

  function renderHistory() {
    const container = document.getElementById('historyList');
    if (!records.length) {
      container.innerHTML = '<div class="empty-history">暂无支出记录</div>';
      return;
    }
    container.innerHTML = records.slice(0, 30).map(r => `
      <div class="history-item">
        <div>
          <span class="history-detail">${escapeHtml(r.desc)}</span>
          <span class="history-cat">${r.cat}</span>
          <div style="font-size:11px; color:#8e8e93;">${r.date} · ${r.acct}</div>
        </div>
        <div class="history-amount">-${r.amount.toFixed(2)}</div>
      </div>
    `).join('');
  }

  // 日期选择
  function setupDatePicker() {
    const dateBtn = document.getElementById('dateTriggerBtn');
    const hiddenPicker = document.getElementById('hiddenDatePicker');
    
    function updateDateBtn() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      const day = currentDate.getDate();
      dateBtn.innerText = `📅 ${year}.${month}.${day}`;
    }
    
    dateBtn.addEventListener('click', () => {
      hiddenPicker.value = currentDate.toISOString().split('T')[0];
      hiddenPicker.showPicker();
    });
    
    hiddenPicker.addEventListener('change', (e) => {
      currentDate = new Date(e.target.value);
      updateDateBtn();
    });
    
    updateDateBtn();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // 初始化
  renderCatButtons();
  setupKeyboard();
  setupDatePicker();
  document.getElementById('manualBackupBtn').addEventListener('click', manualBackup);
</script>
</body>
</html>
