<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账本">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>记账本</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
  body { margin: 0; background: #f5f5f7; color: #1c1c1e; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .app { max-width: 500px; margin: 0 auto; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  
  .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; transition: transform 0.3s ease; overflow: hidden; display: flex; flex-direction: column; visibility: hidden; z-index: 1; }
  .active-page { transform: translateX(0) !important; z-index: 5; visibility: visible; }
  .page-main { transform: translateX(0); visibility: visible; z-index: 2; }
  .page-summary, .page-ledger { transform: translateX(100%); }

  /* 顶部栏 */
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: white; border-bottom: 1px solid #efeff4; flex-shrink: 0; }
  .nav-btn { background: none; border: none; font-size: 15px; color: #ff9f0a; font-weight: 600; cursor: pointer; padding: 8px; }
  .date-picker-btn { background: #f2f2f6; padding: 6px 14px; border-radius: 30px; font-size: 13px; color: #ff9f0a; border: none; font-weight: 500; cursor: pointer; }

  /* 主内容区 - 紧凑处理 */
  .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px 16px 0; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; background: #f9f9fb; padding: 8px 0; border-radius: 14px; border: 1px solid #e9e9ef; }
  .item.active { background: #fff2e6; border-color: #ff9f0a; }
  .icon { font-size: 22px; } .name { font-size: 11px; margin-top: 2px; color: #3a3a3c; }
  
  .purpose-input { width: 100%; background: #f9f9fb; border: 1px solid #e9e9ef; border-radius: 14px; padding: 12px 16px; font-size: 15px; outline: none; margin-bottom: 10px; }
  
  /* 金额区 - 压缩间距 */
  .amount-display { text-align: right; padding: 5px 0; border-bottom: 2px solid #ff9f0a; margin-bottom: 5px; }
  .amount-val { font-size: 40px; font-weight: 700; font-family: 'Arial Narrow', monospace; line-height: 1.2; }

  /* 键盘 - 紧贴金额区 */
  .keyboard { background: #ffffff; padding: 5px 16px 20px; border-top: 1px solid #f2f2f6; }
  .key-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .key { flex: 1; background: #f2f2f6; border: none; border-radius: 14px; padding: 14px 0; font-size: 22px; font-weight: 600; cursor: pointer; }
  .key-done { background: #ff9f0a; color: white; }

  /* 列表与汇总 */
  .list-container { flex: 1; overflow-y: auto; padding: 16px; }
  .record-card { background: #f9f9fb; border-radius: 16px; padding: 12px; margin-bottom: 12px; border: 1px solid #e9e9ef; }
  
  .filter-group { display: flex; background: #f2f2f6; border-radius: 12px; padding: 3px; margin: 10px 16px; flex-shrink: 0; }
  .filter-btn { flex: 1; border: none; background: none; padding: 8px; font-size: 13px; border-radius: 10px; cursor: pointer; color: #8e8e93; }
  .filter-btn.active { background: white; color: #1c1c1e; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

  /* 提示与版本号 */
  .toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.2s; z-index: 10000; }
  .toast.show { opacity: 1; }
  
  /* 版本号挪至应用最底部 */
  .version-tag { text-align: center; font-size: 9px; color: #d1d1d6; padding-bottom: 4px; font-family: monospace; background: #ffffff; }

  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .modal-content { background: white; width: 85%; border-radius: 24px; padding: 24px; text-align: center; }
  .btn-block { width: 100%; padding: 14px; margin-top: 10px; border-radius: 15px; border: none; font-size: 16px; font-weight: 600; }
</style>
</head>
<body>

<div class="app">
  <div id="pageMain" class="page page-main active-page">
    <div class="top-bar">
      <div>
        <button class="nav-btn" onclick="openLedger()">📋 流水</button>
        <button class="nav-btn" onclick="openSummary()">📊 汇总</button>
      </div>
      <div>
        <button class="nav-btn" onclick="downloadCSV()">💾 导出</button>
        <button class="nav-btn" onclick="importBackup()">📂 导入</button>
      </div>
    </div>
    <div class="main-content">
      <div style="margin-bottom: 8px;"><button class="date-picker-btn" id="dateBtn">📅 加载中...</button></div>
      <div id="catGrid" class="grid"></div>
      <input type="text" id="descInput" class="purpose-input" placeholder="备注说明..." autocomplete="off">
      <div id="accGrid" class="grid"></div>
      <div class="amount-display"><span class="amount-val" id="amtDisp">0.00</span></div>
    </div>
    <div class="keyboard">
      <div class="key-row">
        <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button><button class="key" style="background:#e5e5ea" onclick="press('del')">⌫</button>
      </div>
      <div class="key-row">
        <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button><button class="key key-done" onclick="save()">✓</button>
      </div>
      <div class="key-row">
        <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button><button class="key" style="background:#e5e5ea" onclick="press('C')">C</button>
      </div>
      <div class="key-row">
        <button class="key" style="flex:2.2" onclick="press('0')">0</button><button class="key" onclick="press('.')">.</button>
      </div>
    </div>
    <div class="version-tag">v2.2</div>
  </div>

  <div id="pageSummary" class="page page-summary">
    <div class="top-bar"><button class="nav-btn" onclick="closePage()">← 返回</button><b>汇总分析</b><div style="width:40px"></div></div>
    <div class="filter-group">
      <button class="filter-btn active" id="dimDay" onclick="setDim('time','day')">日</button>
      <button class="filter-btn" id="dimMonth" onclick="setDim('time','month')">月</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" id="dimCat" onclick="setDim('group','cat')">分类</button>
      <button class="filter-btn" id="dimAcc" onclick="setDim('group','acc')">账户</button>
    </div>
    <div id="summaryContent" class="list-container"></div>
  </div>

  <div id="pageLedger" class="page page-ledger">
    <div class="top-bar"><button class="nav-btn" onclick="closePage()">← 返回</button><b>流水明细</b><div style="width:40px"></div></div>
    <div id="ledgerContent" class="list-container"></div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top:0">修改记录</h3>
      <input type="number" id="editAmt" class="purpose-input" style="text-align:center; font-size:24px">
      <input type="text" id="editDesc" class="purpose-input" placeholder="备注">
      <button class="btn-block key-done" onclick="confirmUpdate()">保存</button>
      <button class="btn-block" style="background:#ff3b30; color:white;" onclick="confirmDelete()">删除</button>
      <button class="nav-btn" style="margin-top:10px; color:#aeaeb2" onclick="closeModal()">取消</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <input type="date" id="dateInput" style="display:none">
</div>

<script>
  const CATEGORIES = ["餐饮","交通","购物","娱乐","住房","宝宝","日用","其他"];
  const ICONS = ["🍜","🚗","🛒","🎬","🏠","👶","🧴","📦"];
  const ACCOUNTS = ["现金","信用卡","借记卡","微信"];
  const ACC_ICONS = ["💵","💳","🏦","💬"];

  // 核心纠正：直接通过本地时间获取 YYYY-MM-DD
  function getTodayStr() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  let db, records = [], curAmt = "0", curCat = "餐饮", curAcc = "现金";
  let curDateStr = getTodayStr();
  let dimTime = 'day', dimGroup = 'cat', editingId = null;

  // DB 初始化
  const request = indexedDB.open("LedgerSystem", 4);
  request.onupgradeneeded = e => {
    let d = e.target.result;
    if(!d.objectStoreNames.contains("records")) d.createObjectStore("records", {keyPath: "id"});
    if(!d.objectStoreNames.contains("backups")) d.createObjectStore("backups", {keyPath: "slot"});
  };
  request.onsuccess = e => { db = e.target.result; load(); };

  function load() {
    db.transaction("records").objectStore("records").getAll().onsuccess = e => {
      records = e.target.result.sort((a,b) => b.id - a.id);
      renderMain();
    };
  }

  function renderMain() {
    document.getElementById('amtDisp').innerText = parseFloat(curAmt).toFixed(2);
    document.getElementById('dateBtn').innerText = "📅 " + curDateStr;
    
    document.getElementById('catGrid').innerHTML = CATEGORIES.map((n, i) => `
      <div class="item ${curCat==n?'active':''}" onclick="curCat='${n}';renderMain()">
        <span class="icon">${ICONS[i]}</span><span class="name">${n}</span>
      </div>`).join('');
    
    document.getElementById('accGrid').innerHTML = ACCOUNTS.map((n, i) => `
      <div class="item ${curAcc==n?'active':''}" onclick="curAcc='${n}';renderMain()">
        <span class="icon">${ACC_ICONS[i]}</span><span class="name">${n}</span>
      </div>`).join('');
  }

  function press(k) {
    if(k === 'C') curAmt = "0";
    else if(k === 'del') curAmt = curAmt.length > 1 ? curAmt.slice(0, -1) : "0";
    else if(k === '.') { if(!curAmt.includes('.')) curAmt += '.'; }
    else curAmt = curAmt === "0" ? k : curAmt + k;
    renderMain();
  }

  function save() {
    if(parseFloat(curAmt) <= 0) return showToast("金额无效");
    const r = { id: Date.now(), amt: parseFloat(curAmt), cat: curCat, acc: curAcc, desc: document.getElementById('descInput').value || "无说明", date: curDateStr };
    db.transaction("records", "readwrite").objectStore("records").add(r).onsuccess = () => {
      records.unshift(r); curAmt = "0"; document.getElementById('descInput').value = "";
      renderMain(); showToast("已记账", 800);
    };
  }

  function openLedger() {
    const cont = document.getElementById('ledgerContent');
    cont.innerHTML = records.map(r => `
      <div class="record-card" onclick="openEdit(${r.id})">
        <div style="font-size:11px; color:#8e8e93">${r.date}</div>
        <div style="display:flex; justify-content:space-between; margin-top:4px">
          <span style="font-size:14px"><b>${r.cat}</b> <small>(${r.acc})</small></span>
          <b style="color:#ff3b30; font-family:monospace;">¥${r.amt.toFixed(2)}</b>
        </div>
        <div style="font-size:13px; color:#3a3a3c; margin-top:3px">${r.desc}</div>
      </div>`).join('');
    document.getElementById('pageLedger').classList.add('active-page');
  }

  function openEdit(id) {
    const r = records.find(x => x.id === id);
    editingId = id;
    document.getElementById('editAmt').value = r.amt;
    document.getElementById('editDesc').value = r.desc;
    document.getElementById('editModal').style.display = 'flex';
  }

  function confirmUpdate() {
    const r = records.find(x => x.id === editingId);
    r.amt = parseFloat(document.getElementById('editAmt').value);
    r.desc = document.getElementById('editDesc').value;
    db.transaction("records", "readwrite").objectStore("records").put(r).onsuccess = () => {
      closeModal(); load(); openLedger(); showToast("已修改", 800);
    };
  }

  function confirmDelete() {
    if(confirm("确定删除吗？")) {
      db.transaction("records", "readwrite").objectStore("records").delete(editingId).onsuccess = () => {
        closeModal(); load(); openLedger(); showToast("已删除", 800);
      };
    }
  }

  function setDim(type, val) {
    if(type === 'time') {
      dimTime = val;
      document.getElementById('dimDay').classList.toggle('active', val === 'day');
      document.getElementById('dimMonth').classList.toggle('active', val === 'month');
    } else {
      dimGroup = val;
      document.getElementById('dimCat').classList.toggle('active', val === 'cat');
      document.getElementById('dimAcc').classList.toggle('active', val === 'acc');
    }
    refreshSummary();
  }

  function openSummary() { refreshSummary(); document.getElementById('pageSummary').classList.add('active-page'); }

  function refreshSummary() {
    const map = {};
    records.forEach(r => {
      const tKey = dimTime === 'day' ? r.date : r.date.substring(0, 7);
      const gKey = dimGroup === 'cat' ? r.cat : r.acc;
      const key = `${tKey} | ${gKey}`;
      map[key] = (map[key] || 0) + r.amt;
    });
    const sorted = Object.keys(map).sort((a,b) => b.localeCompare(a));
    document.getElementById('summaryContent').innerHTML = sorted.map(k => `
      <div style="display:flex; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #efeff4">
        <span style="font-size:14px">${k}</span>
        <b style="color:#ff9f0a; font-family:monospace;">¥${map[k].toFixed(2)}</b>
      </div>`).join('');
  }

  function downloadCSV() {
    if(!records.length) return showToast("无数据");
    let csv = "\ufeff日期,分类,账户,说明,金额\n" + records.map(r => `${r.date},${r.cat},${r.acc},"${r.desc}",${r.amt}`).join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `账本_${getTodayStr()}.csv`;
    a.click();
    showToast("已下载", 600);
  }

  function importBackup() {
    db.transaction("backups").objectStore("backups").getAll().onsuccess = e => {
      const res = e.target.result;
      if(!res.length) return showToast("无沙盒记录");
      const latest = res.reduce((a,b) => a.time > b.time ? a : b);
      if(confirm("恢复最后一次备份？")) {
        const tx = db.transaction("records", "readwrite");
        const store = tx.objectStore("records");
        store.clear();
        latest.data.forEach(r => store.add(r));
        tx.oncomplete = () => location.reload();
      }
    };
  }

  function showToast(msg, time = 1500) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), time);
  }
  function closePage() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); }
  function closeModal() { document.getElementById('editModal').style.display = 'none'; editingId = null; }
  
  const dInp = document.getElementById('dateInput');
  document.getElementById('dateBtn').onclick = () => dInp.showPicker();
  dInp.onchange = e => { if(e.target.value) { curDateStr = e.target.value; renderMain(); } };
  dInp.value = curDateStr;

  renderMain();
</script>
</body>
</html>
